<div class="create-community">
  <otui-card>
    <div class="card-header">
      <h2>Create New Community</h2>
      <p>Start a new community and invite others to join</p>
    </div>

    <form [formGroup]="communityForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <lib-text-input
          formControlName="name"
          label="Community Name"
          placeholder="Enter community name"
          [required]="true"
        >
        </lib-text-input>
      </div>

      <div class="form-group">
        <lib-text-area
          formControlName="description"
          label="Description"
          placeholder="Describe what this community is about"
          [rows]="4"
        >
        </lib-text-area>
      </div>

      <div class="form-group">
        <lib-select
          formControlName="joinPolicy"
          label="Join Policy"
          [options]="joinPolicyOptions"
        >
        </lib-select>
      </div>

      <div class="form-group">
        <lib-checkbox formControlName="isPrivate" label="Private Community">
        </lib-checkbox>
        <p class="help-text">Private communities are only visible to members</p>
      </div>

      <div class="form-group">
        <lib-text-input
          formControlName="tags"
          label="Tags"
          placeholder="Enter tags separated by commas"
        >
        </lib-text-input>
        <p class="help-text">e.g., gaming, technology, music</p>
      </div>

      @if (error()) {
      <div class="error-message">
        {{ error() }}
      </div>
      }

      <div class="form-actions">
        <otui-button variant="secondary" (action)="onCancel()" type="button">
          Cancel
        </otui-button>
        <otui-button variant="primary" type="submit" [disabled]="loading()">
          {{ loading() ? 'Creating...' : 'Create Community' }}
        </otui-button>
      </div>
    </form>
  </otui-card>
</div>
