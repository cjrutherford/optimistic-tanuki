<section
  class="aurora-ribbon"
  [class.is-fallback]="reducedMotion"
  [style.height]="height"
  [style.--aurora-speed]="speed"
  [style.--aurora-intensity]="intensity"
>
  <div class="aurora-backdrop"></div>

  <div
    *ngFor="let layer of layers"
    class="aurora-layer"
    [style.--layer-index]="layer"
  ></div>
</section>
