<section
  class="particle-veil"
  [class.is-fallback]="reducedMotion"
  [style.height]="height"
  [style.--veil-speed]="speed"
  [style.--veil-intensity]="intensity"
>
  <div class="particle-grid"></div>

  <span
    *ngFor="let particle of particles"
    class="particle"
    [style.left]="particle.left"
    [style.top]="particle.top"
    [style.width]="particle.size"
    [style.height]="particle.size"
    [style.opacity]="particle.opacity"
    [style.animation-delay]="particle.delay"
    [style.animation-duration]="particle.duration"
    [style.--particle-drift-x]="particle.driftX"
    [style.--particle-drift-y]="particle.driftY"
  ></span>

  <div class="veil-overlay">
    <p class="eyebrow">Motion UI</p>
    <h3>Particle Veil</h3>
    <p class="caption">
      A soft drifting field for page headers, atmospheric cards, and cinematic
      backdrops.
    </p>
  </div>
</section>
