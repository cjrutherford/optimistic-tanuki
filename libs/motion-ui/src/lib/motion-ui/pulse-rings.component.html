<section
  class="pulse-rings"
  [class.is-fallback]="reducedMotion"
  [style.height]="height"
  [style.--pulse-speed]="speed"
  [style.--pulse-intensity]="intensity"
>
  <div class="pulse-core"></div>

  <div
    *ngFor="let ring of rings"
    class="pulse-ring"
    [style.--ring-index]="ring"
  ></div>

  <div class="pulse-overlay">
    <p class="eyebrow">Motion UI</p>
    <h3>Pulse Rings</h3>
    <p class="caption">
      Concentric signal waves for callouts, hero anchors, and soft beacons.
    </p>
  </div>
</section>
