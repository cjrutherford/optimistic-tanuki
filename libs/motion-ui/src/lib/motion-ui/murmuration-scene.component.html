<section
  class="murmuration-scene"
  [class.is-fallback]="fallbackMode || reducedMotion"
  [style.height]="height"
>
  <div class="murmuration-backdrop"></div>
  <div class="murmuration-orbit murmuration-orbit-a"></div>
  <div class="murmuration-orbit murmuration-orbit-b"></div>
  <canvas #canvas class="murmuration-canvas"></canvas>

  <div class="murmuration-overlay">
    <p class="eyebrow">Motion UI</p>
    <h3>Murmuration</h3>
    <p class="caption">
      A compact flocking accent tuned by the active personality and palette.
    </p>
  </div>
</section>
