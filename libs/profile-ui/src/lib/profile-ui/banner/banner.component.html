<otui-card>
  <div
    class="banner"
    [style.backgroundImage]="backgroundStyle"
    (click)="onBannerClick()"
    style="cursor: pointer"
  >
    <div class="filter-layer">
      <lib-profile-photo
        class="profile-image"
        [src]="profileImage"
        [alt]="displayName"
      />
      <p class="profile-name">{{ displayName }}</p>
      <ng-content select="[actions]"></ng-content>
    </div>
  </div>
</otui-card>
