<otui-card>
  <div class="thread-header" (click)="onThreadClick()">
    <h4>{{ thread.title }}</h4>
    <span *ngIf="thread.isPinned" class="pinned-badge">📌</span>
    <span *ngIf="thread.isLocked" class="locked-badge">🔒</span>
  </div>
  <div class="thread-content">{{ thread.content }}</div>
  <div class="thread-meta">
    <span>👁️ {{ thread.viewCount }} views</span>
    <span>Created: {{ thread.createdAt | date }}</span>
  </div>
  <div class="thread-actions" *ngIf="canEdit || canDelete">
    <otui-button *ngIf="canEdit" (click)="onEdit()">Edit</otui-button>
    <otui-button *ngIf="canDelete" (click)="onDelete()">Delete</otui-button>
  </div>
</otui-card>
