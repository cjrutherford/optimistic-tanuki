<otui-card>
  <form (ngSubmit)="onSubmit()">
    <h3>Create New Thread</h3>

    <div class="form-group">
      <label for="topic">Topic</label>
      <lib-select
        id="topic"
        [(ngModel)]="selectedTopicId"
        name="topic"
        required
      >
        <option value="">Select a Topic</option>
        <option *ngFor="let topic of topics" [value]="topic.id">
          {{ topic.title }}
        </option>
      </lib-select>
    </div>

    <div class="form-group">
      <label for="title">Title</label>
      <lib-text-input
        id="title"
        [(ngModel)]="title"
        name="title"
        placeholder="Thread Title"
        required
      ></lib-text-input>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <lib-text-input
        id="description"
        [(ngModel)]="description"
        name="description"
        placeholder="Description"
      ></lib-text-input>
    </div>

    <div class="form-group">
      <label for="visibility">Visibility</label>
      <lib-select
        id="visibility"
        [(ngModel)]="visibility"
        name="visibility"
      >
        <option value="public">Public</option>
        <option value="private">Private</option>
      </lib-select>
    </div>

    <div class="actions">
      <otui-button type="submit" [disabled]="!title || !selectedTopicId">Create Thread</otui-button>
      <otui-button type="button" variant="secondary" (click)="onCancel()">Cancel</otui-button>
    </div>
  </form>
</otui-card>
