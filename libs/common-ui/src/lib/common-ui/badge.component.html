<span class="badge" [class]="'badge--' + variant + ' badge--' + size">
  @if (icon === 'check') {
  <svg
    class="badge__icon"
    width="14"
    height="14"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="3"
  >
    <polyline points="20 6 9 17 4 12" />
  </svg>
  } @else if (icon === 'star') {
  <svg
    class="badge__icon"
    width="14"
    height="14"
    viewBox="0 0 24 24"
    fill="currentColor"
  >
    <polygon
      points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
    />
  </svg>
  } @else if (icon === 'shield') {
  <svg
    class="badge__icon"
    width="14"
    height="14"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  >
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
  </svg>
  }
  <ng-content></ng-content>
</span>
