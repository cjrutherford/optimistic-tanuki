<otui-card
  class="compose-card"
  [class.dragover]="isDragOver"
  (dragenter)="handleDragEnter($event)"
  (dragover)="handleDragOver($event)"
  (dragleave)="handleDragLeave($event)"
  (drop)="handleDrop($event)"
  [variantOverrides]="{ background: backgroundGradient }"
>
  <!-- Theme Configuration Panel -->
  <div class="theme-config-panel">
    <div
      class="theme-config-header"
      (click)="toggleThemeConfig()"
      (keyup.enter)="toggleThemeConfig()"
      tabindex="0"
    >
      <span>Post Theme Configuration</span>
      <span class="material-icons">{{
        isThemeConfigVisible ? 'expand_less' : 'expand_more'
      }}</span>
    </div>
    @if (isThemeConfigVisible) {
    <div class="theme-config-content">
      <div class="form-group">
        <span class="label">Theme Mode</span>
        <div class="theme-toggles">
          <otui-button
            [variant]="postTheme === 'light' ? 'primary' : 'outlined'"
            (action)="updatePostTheme('light')"
            >Light</otui-button
          >
          <otui-button
            [variant]="postTheme === 'dark' ? 'primary' : 'outlined'"
            (action)="updatePostTheme('dark')"
            >Dark</otui-button
          >
        </div>
      </div>
      <div class="form-group">
        <label for="socialAccentColorPicker">Accent Color</label>
        <input
          id="socialAccentColorPicker"
          type="color"
          [ngModel]="postAccentColor"
          (ngModelChange)="updatePostAccentColor($event)"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
    </div>
    }
  </div>

  <form>
    <label for="title">Title</label>
    <lib-text-input
      id="title"
      [type]="'text'"
      [(ngModel)]="title"
      [ngModelOptions]="{ standalone: true }"
      placeholder="Name your Masterpiece"
    ></lib-text-input>
    @if (titleError) {
    <div class="error-message">{{ titleError }}</div>
    }

    <label for="content">Content</label>
    @if (contentError) {
    <div class="error-message">{{ contentError }}</div>
    } @if (editor) {
    <lib-rich-text-toolbar
      [editor]="editor"
      (componentsClicked)="onToolbarComponentsClick()"
      (imageUploadClicked)="onToolbarImageUploadClick()"
    ></lib-rich-text-toolbar>
    }
    <input
      type="file"
      id="imageInput"
      #imageInput
      hidden
      (change)="onFileSelected($event)"
      accept="image/*"
    />
    @if(editor) {
    <tiptap-editor
      [editor]="editor"
      [(ngModel)]="content"
      [ngModelOptions]="{ standalone: true }"
      class="tiptap-editor-styles"
    ></tiptap-editor>
    }

    <otui-button (action)="onPostSubmit()">Post</otui-button>
  </form>
</otui-card>

<!-- Component injection selector -->
<lib-component-selector
  [isVisible]="isComponentSelectorVisible"
  [components]="registeredComponents"
  (componentSelected)="onComponentSelected($event)"
  (closed)="hideComponentSelector()"
></lib-component-selector>

<ng-container #componentContainer></ng-container>
