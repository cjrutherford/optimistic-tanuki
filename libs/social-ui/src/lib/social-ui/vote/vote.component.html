<div>
  <otui-button
    [variant]="voteState === 1 ? 'success' : 'danger'"
    (action)="upvote()"
    [class.active]="voteState === 1"
    >⬆️</otui-button
  >
  <otui-button
    [variant]="voteState === 0 ? 'success' : 'danger'"
    (action)="cancelVote()"
    [class.active]="voteState === 0"
    >😑</otui-button
  >
  <otui-button
    [variant]="voteState === -1 ? 'success' : 'danger'"
    (action)="downvote()"
    [class.active]="voteState === -1"
    >⬇️</otui-button
  >
</div>
