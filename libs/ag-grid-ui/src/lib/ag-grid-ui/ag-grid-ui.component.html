<div class="ag-grid-wrapper" [style.height]="height" [style.width]="width">
  <ag-grid-angular
    class="ag-theme-quartz ag-theme-optimistic"
    style="height: 100%; width: 100%"
    [rowData]="rowDataSignal()"
    [columnDefs]="columnDefsSignal()"
    [gridOptions]="mergedGridOptions"
    (gridReady)="onGridReady($event)"
  ></ag-grid-angular>
</div>
