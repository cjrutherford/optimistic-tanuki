<div class="toggle-container">
  <form action="none">
    <div class="theme-switch">
      <div class="theme-label">☀</div>
      <label class="switch">
        <input
          type="checkbox"
          [checked]="theme === 'dark'"
          (change)="toggleTheme()"
        />
        <span class="slider round">️</span>
      </label>
      <div class="theme-label">🌙</div>
    </div>
    <div class="accent-picker">
      <input
        type="color"
        name="accent-color"
        [(ngModel)]="accentColor"
        (change)="updateAccentColor()"
      />
    </div>
    <div class="personality-selector">
      <button
        class="personality-trigger"
        type="button"
        (click)="togglePersonalityPicker()"
        [class.active]="showPersonalityPicker"
        aria-label="Select personality"
      >
        <span class="personality-current">
          {{ currentPersonality?.name || 'Classic' }}
        </span>
        <span class="personality-icon">⚙</span>
      </button>
    </div>
  </form>
</div>

<!-- CDK Overlay backdrop styling -->
<div
  class="cdk-overlay-backdrop personality-picker-backdrop"
  *ngIf="showPersonalityPicker"
></div>
