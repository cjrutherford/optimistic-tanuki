<div class="login-container">
  <otui-card>
    <div class="card-outer">
      <div class="card-inner">
        <div class="hero">
          <h1>{{ title }}</h1>
          <p>{{ description }}</p>
          <img width="300px" src="{{ heroSrc }}" alt="{{ heroAlt }}" />
        </div>
        <div class="form">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <lib-text-input
              formControlName="email"
              label="Email"
            ></lib-text-input>
            <lib-text-input
              formControlName="password"
              label="Password"
              type="password"
            ></lib-text-input>
            <otui-button type="submit">Login</otui-button>
          </form>
          <div class="email-auth-actions" aria-label="Email sign in options">
            <button
              type="button"
              (click)="requestMagicLink()"
              [disabled]="emailActionPending"
            >
              Email me a magic link
            </button>
            <button
              type="button"
              (click)="requestPasswordReset()"
              [disabled]="emailActionPending"
            >
              Forgot password?
            </button>
            <button
              type="button"
              (click)="requestVerification()"
              [disabled]="emailActionPending"
            >
              Resend verification
            </button>
          </div>
          @if (emailActionStatus) {
          <p class="email-auth-status" role="status">{{ emailActionStatus }}</p>
          }
          <lib-oauth-buttons
            *ngIf="showOAuth"
            [enabledProviders]="enabledOAuthProviders"
            (providerSelected)="onOAuthProvider($event)"
          ></lib-oauth-buttons>
        </div>
      </div>
    </div>
  </otui-card>
</div>
