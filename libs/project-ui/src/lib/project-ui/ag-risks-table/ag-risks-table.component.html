<div class="ag-risks-table-container">
  <otui-ag-grid
    [rowData]="risks"
    [columnDefs]="columnDefs"
    [gridOptions]="gridOptions"
    [height]="'600px'"
  />
  
  <div class="action-group">
    <otui-button (click)="showModal = true">➕ Add Risk</otui-button>
  </div>
</div>

@if (showEditModal && selectedRisk) {
  <otui-modal
    (closeModal)="showEditModal = false"
    [heading]="'Edit Risk'"
  >
    <lib-risk-form
      [risk]="selectedRisk"
      (submitted)="onEditFormSubmit($event)"
    />
  </otui-modal>
}

@if (showModal) {
  <otui-modal
    (closeModal)="closeModal()"
    [heading]="'Add Risk'"
  >
    <lib-risk-form 
      (submitted)="onCreateFormSubmit($event)"
    />
  </otui-modal>
}
