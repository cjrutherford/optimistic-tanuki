<form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
  <otui-card>
    <lib-text-input formControlName="title" label="Title"></lib-text-input>
    <lib-text-area
      formControlName="description"
      label="Description"
    ></lib-text-area>
    <lib-select
      formControlName="status"
      label="Status"
      [options]="statusOptions"
    >
    </lib-select>
    <lib-select
      formControlName="priority"
      label="Priority"
      [options]="priorityOptions"
    >
    </lib-select>
    
    <div class="tags-section">
      <label class="tags-label">Tags</label>
      <lib-tag-selector
        [availableTags]="availableTags"
        [selectedTagIds]="selectedTagIds"
        (selectionChange)="onTagSelectionChange($event)"
      ></lib-tag-selector>
    </div>
    
    <otui-button type="submit">Save</otui-button>
  </otui-card>
</form>
