<div class="task-calendar-container">
  <full-calendar [options]="calendarOptions"></full-calendar>
</div>

<!-- Create Task Modal -->
@if(showModal()) {
<otui-modal [title]="'Create Task'" (closeModal)="closeModal()">
  <lib-task-form (formSubmit)="onCreateFormSubmit($event)"> </lib-task-form>
</otui-modal>
}

<!-- Edit Task Modal -->
@if(showEditModal() && selectedTask()) {
<otui-modal [title]="'Edit Task'" (closeModal)="closeEditModal()">
  <lib-task-form
    [task]="selectedTask()"
    (formSubmit)="onEditFormSubmit($event)"
  >
  </lib-task-form>
</otui-modal>
}
