<div class="ag-tasks-table-container">
  <div class="action-group">
    <otui-button (click)="showModal.set(true)">➕ Add Task</otui-button>
  </div>
  
  <otui-ag-grid
    [rowData]="gridData()"
    [columnDefs]="columnDefs"
    [gridOptions]="gridOptions"
    [height]="'600px'"
    [loading]="loading"
  />
</div>

@if (showEditModal() && selectedTask()) {
  <otui-modal
    (closeModal)="showEditModal.set(false)"
    [heading]="'Edit Task'"
  >
    <lib-task-form
      [task]="selectedTask()"
      (formSubmit)="onEditFormSubmit($event)"
      (close)="showEditModal.set(false)"
    />
  </otui-modal>
}

@if (showModal()) {
  <otui-modal
    (closeModal)="closeModal()"
    [heading]="'Add Task'"
  >
    <lib-task-form 
      (formSubmit)="onCreateFormSubmit($event)" 
      (close)="closeModal()"
    />
  </otui-modal>
}
