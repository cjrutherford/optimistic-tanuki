<otui-modal
  [heading]="heading"
  (close)="onClose()"
  [position]="'sidebar-left'"
  [visible]="isOpen"
>
  <otui-card>
    <div class="nav-links">
      <otui-button
        *ngFor="let item of navItems; track: index"
        [variant]="getVariant(item)"
        (action)="onNavItemClick(item)"
      >
        {{ item.label }}
      </otui-button>
    </div>
  </otui-card>
</otui-modal>
