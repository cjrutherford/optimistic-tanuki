<otui-modal
  [heading]="heading"
  (close)="onClose()"
  [position]="'sidebar-left'"
  [visible]="isOpen"
>
  <otui-card>
    <div class="nav-links">
      @for (item of navItems; track item.label) {
      <otui-button [variant]="getVariant(item)" (action)="onNavItemClick(item)">
        {{ item.label }}
      </otui-button>
      }
    </div>
  </otui-card>
</otui-modal>
