<div *ngIf="useTile; else cardTemplate">
  <otui-tile style="width: 100%; display: block">
    <div
      class="title-bar"
      [class.compact]="isCompact"
      [class.small]="isSmall"
    >
      <img
        *ngIf="logoSrc"
        [src]="logoSrc"
        [alt]="logoAlt"
        [attr.width]="isSmall ? 40 : isCompact ? 52 : 75"
      />
      <otui-heading
        [text]="appTitle"
        [size]="isSmall ? '1.25em' : isCompact ? '1.5em' : '2em'"
      ></otui-heading>
      <lib-theme-toggle *ngIf="showThemeToggle"></lib-theme-toggle>
      <otui-button class="menu-btn" (click)="onMenuClick()">{{
        menuIcon
      }}</otui-button>
    </div>
  </otui-tile>
</div>

<ng-template #cardTemplate>
  <otui-card>
    <div
      class="title-bar"
      [class.compact]="isCompact"
      [class.small]="isSmall"
    >
      <otui-button variant="rounded" (click)="onMenuClick()">
        <img
          *ngIf="logoSrc"
          [src]="logoSrc"
          [alt]="logoAlt"
          [style.maxWidth.px]="isSmall ? 40 : isCompact ? 52 : 75"
          [style.borderRadius]="'50%'"
        />
      </otui-button>
      <h1>{{ appTitle }}</h1>
      <lib-theme-toggle *ngIf="showThemeToggle"></lib-theme-toggle>
    </div>
  </otui-card>
</ng-template>
