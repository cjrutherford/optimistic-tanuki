<div
  class="product-list"
  [style.grid-template-columns]="'repeat(' + columns + ', 1fr)'"
>
  <store-product-card
    *ngFor="let product of products"
    [product]="product"
    (addToCart)="onAddToCart($event)"
  >
  </store-product-card>
</div>

<div class="empty-state" *ngIf="products.length === 0">
  <p>No products available</p>
</div>
