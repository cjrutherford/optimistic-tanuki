<div class="form-field">
  <label class="form-check">
    <input
      type="checkbox"
      [checked]="value"
      (change)="onCheckboxChange($event)"
      [disabled]="disabled"
    />
    <span class="checkmark"></span>
    @if (label) {
    <span class="form-check-label">{{ label }}</span>
    }
  </label>
  @if (errorMessage) {
  <span class="error-message">{{ errorMessage }}</span>
  }
</div>
