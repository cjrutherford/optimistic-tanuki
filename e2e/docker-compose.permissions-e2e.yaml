# Docker Compose for Permissions E2E Tests
# Setup for testing permissions microservice
services:
  db:
    image: postgres:latest
    restart: always
    container_name: e2e_db_permissions
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: node:lts-alpine
    container_name: e2e_db_setup_permissions
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && npm run db:setup"
    restart: 'no'

  permissions:
    container_name: e2e_permissions
    build:
      context: ..
      dockerfile: ./apps/permissions/Dockerfile
    ports:
      - '3012:3012'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: postgres
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
