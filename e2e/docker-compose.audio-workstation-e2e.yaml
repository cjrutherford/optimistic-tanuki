version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: ot_redis_e2e
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12

  db:
    image: postgres:latest
    container_name: ot_postgres_e2e
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: optimistic_tanuki_e2e
    volumes:
      - postgres_data_e2e:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 12

  db-setup:
    image: node:24-alpine
    container_name: ot_db_setup_e2e
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && pnpm run db:setup"
    restart: 'no'

  audio-workstation:
    build:
      context: ..
      dockerfile: ./apps/audio-workstation/Dockerfile
    container_name: ot_audio_workstation_e2e
    ports:
      - '3025:3025'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: optimistic_tanuki_e2e
      AUDIO_WORKSTATION_PORT: 3025
      SERVICE_ASSETS_HOST: assets
      SERVICE_ASSETS_PORT: 3005
      SERVICE_AI_ORCHESTRATOR_HOST: ai-orchestrator
      SERVICE_AI_ORCHESTRATOR_PORT: 3010
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

volumes:
  postgres_data_e2e:
