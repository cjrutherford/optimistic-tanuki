# Docker Compose for Telos Docs Service E2E Tests
# Minimal setup for testing telos-docs-service microservice
services:
  db:
    image: postgres:latest
    restart: always
    container_name: e2e_db_telos_docs
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: node:lts-alpine
    container_name: e2e_db_setup_telos_docs
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && npm run db:setup"
    restart: 'no'

  telos-docs-service:
    container_name: e2e_telos_docs_service
    build:
      context: ..
      dockerfile: ./apps/telos-docs-service/Dockerfile
    ports:
      - '3008:3008'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: postgres
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
