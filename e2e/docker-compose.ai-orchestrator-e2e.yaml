version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: ot_redis_e2e
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12

  db:
    image: postgres:latest
    container_name: ot_postgres_e2e
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: optimistic_tanuki_e2e
    volumes:
      - postgres_data_e2e:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 12

  db-setup:
    image: node:lts-alpine
    container_name: ot_db_setup_e2e
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      ADDITIONAL_DBS: ot_profile,ot_telos_docs_service,ot_blogging,ot_chat_collector,ot_permissions,ot_social
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && npm run db:setup"
    restart: 'no'

  gateway:
    image: optimistic-tanuki-gateway
    build:
      context: ..
      dockerfile: ./apps/gateway/Dockerfile
    container_name: ot_gateway_e2e
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=db://db:postgres@db:5432/optimistic_tanuki_e2e
    depends_on:
      - db
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 5s
      timeout: 5s
      retries: 12

  mcp-server:
    image: optimistic-tanuki-gateway
    container_name: ot_mcp_server_e2e
    # no host port mapping; accessible to other containers via Docker network
    environment:
      - DATABASE_URL=db://db:postgres@db:5432/optimistic_tanuki_e2e
    depends_on:
      - db
      - telos-docs-service
      - profile
    healthcheck:
      test:
        [
          'CMD',
          'bash',
          '-lc',
          'curl -f http://localhost:3000/api/health || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  chat-collector:
    image: optimistic-tanuki-chat-collector
    build:
      context: ..
      dockerfile: ./apps/chat-collector/Dockerfile
    container_name: ot_chat_collector_e2e
    networks:
      default:
        aliases:
          - ot_chat_collector
    ports:
      - '3007:3007'
    environment:
      - DATABASE_URL=db://db:postgres@db:5432/optimistic_tanuki_e2e
    volumes:
      - ../scripts/tcp-health-check.js:/usr/src/app/tcp-health-check.js
    depends_on:
      db-setup:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', 'tcp-health-check.js', 'localhost', '3007']
      interval: 5s
      timeout: 5s
      retries: 12

  telos-docs-service:
    image: optimistic-tanuki-telos-docs-service
    build:
      context: ..
      dockerfile: ./apps/telos-docs-service/Dockerfile
    container_name: ot_telos_docs_service_e2e
    networks:
      default:
        aliases:
          - ot_telos_docs_service
    ports:
      - '3008:3008'
    environment:
      - DATABASE_URL=db://db:postgres@db:5432/optimistic_tanuki_e2e
    volumes:
      - ../scripts/tcp-health-check.js:/usr/src/app/tcp-health-check.js
    depends_on:
      db-setup:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', 'tcp-health-check.js', 'localhost', '3008']
      interval: 5s
      timeout: 5s
      retries: 12

  profile:
    image: optimistic-tanuki-profile
    build:
      context: ..
      dockerfile: ./apps/profile/Dockerfile
    container_name: ot_profile_e2e
    networks:
      default:
        aliases:
          - ot_profile
    ports:
      - '3002:3002'
    environment:
      - DATABASE_URL=db://db:postgres@db:5432/optimistic_tanuki_e2e
    volumes:
      - ../scripts/tcp-health-check.js:/usr/src/app/tcp-health-check.js
    depends_on:
      db-setup:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', 'tcp-health-check.js', 'localhost', '3002']
      interval: 5s
      timeout: 5s
      retries: 12

  project-planning:
    image: optimistic-tanuki-project-planning
    build:
      context: ..
      dockerfile: ./apps/project-planning/Dockerfile
    container_name: ot_project_planning_e2e
    networks:
      default:
        aliases:
          - ot_project_planning
    ports:
      - '3006:3006'
    environment:
      - DATABASE_URL=db://db:postgres@db:5432/optimistic_tanuki_e2e
    volumes:
      - ../scripts/tcp-health-check.js:/usr/src/app/tcp-health-check.js
    depends_on:
      db-setup:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', 'tcp-health-check.js', 'localhost', '3006']
      interval: 5s
      timeout: 5s
      retries: 12

  ai-orchestration:
    image: optimistic-tanuki-ai-orchestration
    build:
      context: ..
      dockerfile: ./apps/ai-orchestrator/Dockerfile
    container_name: ot_ai_orchestration_e2e
    networks:
      default:
        aliases:
          - ot_ai_orchestration
    ports:
      - '3010:3010'
    environment:
      - MCP_URL=http://mcp-server:3000/api/mcp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TELEOS_DOCS_URL=http://telos-docs-service:3008
    volumes:
      - ../scripts/tcp-health-check.js:/usr/src/app/tcp-health-check.js
    depends_on:
      - mcp-server
      - redis
      - db
      - telos-docs-service
      - chat-collector
      - project-planning
    healthcheck:
      test: ['CMD', 'node', 'tcp-health-check.js', 'localhost', '3010']
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data_e2e:
    driver: local

networks:
  default:
    name: optimistic-tanuki-e2e
