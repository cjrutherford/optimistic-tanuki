# Docker Compose for App Configurator E2E Tests
services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: node:lts-alpine
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      ADDITIONAL_DBS: ot_app_configurator
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && pnpm run db:setup"
    restart: 'no'

  app-configurator:
    build:
      context: ..
      dockerfile: ./apps/app-configurator/Dockerfile
    ports:
      - '3014:3014'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ot_app_configurator
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3014
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  app-configurator-seed:
    build:
      context: ..
      dockerfile: ./apps/app-configurator/Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ot_app_configurator
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3014
    depends_on:
      app-configurator:
        condition: service_started
    command: sh -c "sleep 5 && node seed-data/seed-script.js"
    restart: 'no'