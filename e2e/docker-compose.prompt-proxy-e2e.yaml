# Docker Compose for Prompt Proxy E2E Tests
# Minimal setup for testing prompt-proxy microservice
services:
  db:
    image: postgres:latest
    restart: always
    container_name: e2e_db_prompt_proxy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: node:lts-alpine
    container_name: e2e_db_setup_prompt_proxy
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && npm run db:setup"
    restart: 'no'

  prompt-proxy:
    container_name: e2e_prompt_proxy
    build:
      context: ..
      dockerfile: ./apps/prompt-proxy/Dockerfile
    ports:
      - '3009:3009'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: postgres
    volumes:
      - ../apps/prompt-proxy/src/assets/config.yaml:/usr/src/assets/config.yaml
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
