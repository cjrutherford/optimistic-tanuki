x-service-db-env: &service_db_env
  DATABASE_HOST: ${POSTGRES_HOST:-db}
  DATABASE_PORT: ${POSTGRES_PORT:-5432}
  DATABASE_USER: ${POSTGRES_USER:-postgres}
  DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  DB_HOST: ${POSTGRES_HOST:-db}
  DB_PORT: ${POSTGRES_PORT:-5432}
  DB_USER: ${POSTGRES_USER:-postgres}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

x-gateway-client-env: &gateway_client_env
  GATEWAY_URL: ${GATEWAY_URL:-http://gateway:3000}
  GATEWAY_WS_URL: ${GATEWAY_WS_URL:-http://gateway:3300}

services:
  postgres:
    image: postgres:17
    restart: always
    container_name: db # Changed back from ot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
  db-setup:
    build:
      context: .
      dockerfile: ./docker/db-setup/Dockerfile
    container_name: db-setup
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -c "command -v pg_isready && sh ./setup-and-migrate.sh"
    restart: 'no'
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  authentication:
    container_name: ot_authentication
    build:
      context: .
      dockerfile: ./apps/authentication/Dockerfile
    image: cjrutherford/optimistic_tanuki_authentication:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${AUTHENTICATION_PORT:-3001}:3001'
    environment:
      <<: *service_db_env
      JWT_SECRET: ${JWT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI:-}
    depends_on:
      postgres:
        condition: service_healthy
      db-setup: # Ensures db-setup is completed before starting authentication
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  ot-client-interface:
    container_name: ot_client_interface # Added
    build:
      context: .
      dockerfile: ./apps/client-interface/Dockerfile
    image: cjrutherford/optimistic_tanuki_client-interface:${PRODUCTION_IMAGE_TAG:-latest}
