        condition: service_healthy
      redis:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  system-configurator-api:
    container_name: ot_system_configurator_api
    build:
      context: .
      dockerfile: ./apps/system-configurator-api/Dockerfile
    image: cjrutherford/optimistic_tanuki_system-configurator-api:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${SYSTEM_CONFIGURATOR_API_PORT:-3021}:3021'
    environment:
      <<: *service_db_env
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3021
      DB_NAME: ot_system_configurator
      PCPARTPICKER_SYNC_ON_START: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  app-configurator-seed:
    container_name: ot_app_configurator_seed
    build:
      context: .
      dockerfile: ./apps/app-configurator/Dockerfile
    image: cjrutherford/optimistic_tanuki_app-configurator:${PRODUCTION_IMAGE_TAG:-latest}
    environment:
      <<: *service_db_env
      DB_NAME: ot_app_configurator
      PORT: 3014
    depends_on:
      app-configurator:
        condition: service_started
    command: sh -c "sleep 5 && node seed-data/seed-script.js"
    restart: 'no'

  configurable-client:
    container_name: ot_configurable_client
    build:
      context: .
      dockerfile: ./apps/configurable-client/Dockerfile
    image: cjrutherford/optimistic_tanuki_configurable-client:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${CONFIGURABLE_CLIENT_PORT:-8090}:4000'
    environment:
      <<: *gateway_client_env
    depends_on:
      - gateway
      - app-configurator
      - app-configurator-seed

  wellness:
    container_name: ot_wellness
    build:
      context: .
      dockerfile: ./apps/wellness/Dockerfile
    image: cjrutherford/optimistic_tanuki_wellness:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${WELLNESS_PORT:-3018}:3018'
    environment:
      <<: *service_db_env
    depends_on:
      postgres:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  classifieds:
    container_name: ot_classifieds
    build:
      context: .
      dockerfile: ./apps/classifieds/Dockerfile
    image: cjrutherford/optimistic_tanuki_classifieds:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${CLASSIFIEDS_PORT:-3017}:3017'
    environment:
      <<: *service_db_env
    depends_on:
      postgres:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  payments:
    container_name: ot_payments
    build:
      context: .
      dockerfile: ./apps/payments/Dockerfile
    image: cjrutherford/optimistic_tanuki_payments:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${PAYMENTS_PORT:-3004}:3004'
    environment:
      <<: *service_db_env
      LEMON_SQUEEZY_API_KEY: ${LEMON_SQUEEZY_API_KEY:-}
      LEMON_SQUEEZY_STORE_ID: ${LEMON_SQUEEZY_STORE_ID:-}
      LEMON_SQUEEZY_WEBHOOK_SECRET: ${LEMON_SQUEEZY_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  local-hub-client-interface:
    container_name: ot_local_hub
    build:
      context: .
      dockerfile: ./apps/local-hub/Dockerfile
    image: cjrutherford/optimistic_tanuki_local-hub:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${LOCAL_HUB_PORT:-8087}:4000'
    environment:
      <<: *gateway_client_env
    depends_on:
      - gateway

  d6:
    container_name: ot_d6
    build:
      context: .
      dockerfile: ./apps/d6/Dockerfile
    image: cjrutherford/optimistic_tanuki_d6:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${D6_PORT:-8086}:4000'
    environment:
      <<: *gateway_client_env
    depends_on:
      - gateway

  videos:
    container_name: ot_videos
    build:
      context: .
      dockerfile: ./apps/videos/Dockerfile
    image: cjrutherford/optimistic_tanuki_videos:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${VIDEOS_PORT:-3022}:3022'
    environment:
      <<: *service_db_env
      POSTGRES_DB: ot_videos
      PORT: 3022
      VIDEO_SEED_SOURCE_DIR: ${VIDEO_SEED_SOURCE_DIR:-/mnt/valhalla/media/TV}
      ASSETS_HOST: ${ASSETS_HOST:-assets}
      ASSETS_PORT: ${ASSETS_PORT:-3005}
      LOCAL_STORAGE_PATH: /usr/src/app/storage
      VIDEO_TRANSCODER_HOST: ${VIDEO_TRANSCODER_HOST:-video-transcoder-worker}
      VIDEO_TRANSCODER_PORT: ${VIDEO_TRANSCODER_PORT:-3023}
    volumes:
      - ${VIDEO_SEED_SOURCE_HOST_PATH:-/mnt/valhalla/media/TV}:${VIDEO_SEED_SOURCE_DIR:-/mnt/valhalla/media/TV}:ro
      - ${ASSETS_HOST_PATH:-/mnt/valhalla/media/tanuki-assets}:/usr/src/app/storage
      - video-processing-data:/tmp/video-processing
    depends_on:
      postgres:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
      assets:
        condition: service_started
      video-transcoder-worker:
        condition: service_started

  video-transcoder-worker:
    container_name: ot_video_transcoder_worker
    build:
      context: .
      dockerfile: ./apps/video-transcoder-worker/Dockerfile
    image: cjrutherford/optimistic_tanuki_video-transcoder-worker:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${VIDEO_TRANSCODER_PORT:-3023}:3023'
    environment:
      - PORT=3023
      - HOST=0.0.0.0
      - VIDEO_TRANSCODER_OUTPUT_ROOT=/tmp/video-processing
    volumes:
      - ${ASSETS_HOST_PATH:-/mnt/valhalla/media/tanuki-assets}:/usr/src/app/storage
      - video-processing-data:/tmp/video-processing

  video-client:
    container_name: ot_video_client
    build:
      context: .
      dockerfile: ./apps/video-client/Dockerfile
    image: cjrutherford/optimistic_tanuki_video-client:${PRODUCTION_IMAGE_TAG:-latest}
    ports:
      - '${VIDEO_CLIENT_PORT:-8093}:4000'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      <<: *gateway_client_env
    depends_on:
      - gateway
      - videos

volumes:
  postgres_data:
  video-processing-data:
