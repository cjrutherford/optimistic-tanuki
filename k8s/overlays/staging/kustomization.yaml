apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: optimistic-tanuki

resources:
  - ../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gateway
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: gateway

configMapGenerator:
  - name: optimistic-tanuki-env
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=debug
