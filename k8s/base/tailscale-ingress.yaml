# Tailscale Ingress Configuration
#
# Each Ingress creates a separate Tailscale proxy device with its own DNS name.
# DNS format: <hostname>.<your-tailnet-name>.ts.net
#
# Examples with default Tailnet "tail-scale":
#   - optimistic-tanuki.tail-scale.ts.net
#   - client-interface.tail-scale.ts.net
#   - forgeofwill.tail-scale.ts.net
#
# To customize the base domain, edit the "host" and "tailscale.com/hostname"
# values below to match your Tailscale account's DNS configuration.
#
# Access URLs:
#   - Gateway API:  https://optimistic-tanuki.tail-scale.ts.net
#   - Client UI:    https://client-interface.tail-scale.ts.net
#   - Forgeofwill:  https://forgeofwill.tail-scale.ts.net
#   - etc.
#
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: optimistic-tanuki-ingress-tailscale
  namespace: optimistic-tanuki
  annotations:
    tailscale.com/hostname: optimistic-tanuki
spec:
  ingressClassName: tailscale
  rules:
    - host: optimistic-tanuki.tail-scale.ts.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
---
