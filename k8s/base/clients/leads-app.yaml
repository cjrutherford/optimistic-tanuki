apiVersion: apps/v1
kind: Deployment
metadata:
  name: leads-app
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leads-app
  template:
    metadata:
      labels:
        app: leads-app
    spec:
      containers:
        - name: leads-app
          image: cjrutherford/optimistic_tanuki_leads-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: leads-app
  namespace: optimistic-tanuki
spec:
  selector:
    app: leads-app
  ports:
    - port: 4201
      targetPort: 4000
  type: LoadBalancer
