apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-site
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: business-site
  template:
    metadata:
      labels:
        app: business-site
    spec:
      containers:
        - name: business-site
          image: cjrutherford/optimistic_tanuki_business-site:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '4000'
            - name: GATEWAY_URL
              value: 'http://gateway:3000'
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '250m'
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: business-site
  namespace: optimistic-tanuki
spec:
  selector:
    app: business-site
  ports:
    - port: 8094
      targetPort: 4000
  type: LoadBalancer
