apiVersion: apps/v1
kind: Deployment
metadata:
  name: owner-console
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: owner-console
  template:
    metadata:
      labels:
        app: owner-console
    spec:
      containers:
        - name: owner-console
          image: cjrutherford/optimistic_tanuki_owner-console:sha-92b0c5c58f8bd553138f1bfb09fedc1d92c221d5
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '4000'
            - name: GATEWAY_URL
              value: 'http://gateway:3000'
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '250m'
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: owner-console
  namespace: optimistic-tanuki
spec:
  selector:
    app: owner-console
  ports:
    - port: 8084
      targetPort: 4000
  type: LoadBalancer
