apiVersion: apps/v1
kind: Deployment
metadata:
  name: christopherrutherford-net
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: christopherrutherford-net
  template:
    metadata:
      labels:
        app: christopherrutherford-net
    spec:
      containers:
        - name: christopherrutherford-net
          image: cjrutherford/optimistic_tanuki_christopherrutherford-net:sha-b5069ddd46734a298d76679f5c63e7d2b5849f06
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '4000'
            - name: GATEWAY_URL
              value: 'http://gateway:3000'
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '250m'
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: christopherrutherford-net
  namespace: optimistic-tanuki
spec:
  selector:
    app: christopherrutherford-net
  ports:
    - port: 8083
      targetPort: 4000
  type: LoadBalancer
