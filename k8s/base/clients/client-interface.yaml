apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-interface
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client-interface
  template:
    metadata:
      labels:
        app: client-interface
    spec:
      containers:
        - name: client-interface
          image: cjrutherford/optimistic_tanuki_client-interface:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: GATEWAY_URL
              value: "http://gateway:3000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: client-interface
  namespace: optimistic-tanuki
spec:
  selector:
    app: client-interface
  ports:
    - port: 8080
      targetPort: 4000
  clusterIP: None
