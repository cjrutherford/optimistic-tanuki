# Public multi-domain ingress for nginx-based cluster deployments.
#
# This ingress models the same public host inventory as the operator nginx
# examples. Keep this file aligned with:
# - k8s/base/config/app-registry.json
# - docs/operators/nginx/*.conf
# - the real public DNS and certbot-managed TLS secrets
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-platform-ingress
  namespace: optimistic-tanuki
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: '50m'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
spec:
  ingressClassName: nginx
  tls:
    # These secrets are expected to be kept in sync from certbot output.
    # See docs/operators/multi-domain-deployments.md for the sync contract.
    - secretName: christopherrutherford-net-public-tls
      hosts:
        - christopherrutherford.net
        - digital-homestead.christopherrutherford.net
        - fin-commander.experiments.christopherrutherford.net
        - lead-tracker.experiments.christopherrutherford.net
        - video.experiments.christopherrutherford.net
        - business.experiments.christopherrutherford.net
    - secretName: optimistic-tanuki-public-tls
      hosts:
        - optimistic-tanuki.com
    - secretName: forgeofwill-public-tls
      hosts:
        - forgeofwill.com
    - secretName: hopefulaspirationsindustries-public-tls
      hosts:
        - hopefulaspirationsindustries.com
        - hardware.hopefulaspirationsindustries.com
        - store.hopefulaspirationsindustries.com
    - secretName: towne-square-public-tls
      hosts:
        - towne-square.com
  rules:
    - host: christopherrutherford.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: christopherrutherford-net
                port:
                  number: 8083
    - host: digital-homestead.christopherrutherford.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: digital-homestead
                port:
                  number: 8082
    - host: optimistic-tanuki.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3301
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-interface
                port:
                  number: 8080
    - host: forgeofwill.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3300
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forgeofwill
                port:
                  number: 8081
    - host: towne-square.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3300
          - path: /
            pathType: Prefix
            backend:
              service:
                name: local-hub
                port:
                  number: 8087
    - host: hopefulaspirationsindustries.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hai
                port:
                  number: 8088
    - host: hardware.hopefulaspirationsindustries.com
      http:
        paths:
