            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: system-configurator
                port:
                  number: 8091
    - host: store.hopefulaspirationsindustries.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: store-client
                port:
                  number: 8085
    - host: fin-commander.experiments.christopherrutherford.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fin-commander
                port:
                  number: 8089
    - host: lead-tracker.experiments.christopherrutherford.net
      http:
