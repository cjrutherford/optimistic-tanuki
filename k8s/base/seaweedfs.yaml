apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-pvc
  namespace: optimistic-tanuki
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: microk8s-hostpath
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  namespace: optimistic-tanuki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:latest
          ports:
            - containerPort: 9333
              name: master
            - containerPort: 8333
              name: volume
            - containerPort: 8888
              name: s3
          command:
            - server
            - -dir=/data
            - -volume.max=100
            - -s3
            - -s3.port=8888
          env:
            - name: WEED_MASTER_PORT
              value: '9333'
            - name: WEED_VOLUME_PORT
              value: '8333'
            - name: WEED_S3_PORT
              value: '8888'
          volumeMounts:
            - name: seaweedfs-data
              mountPath: /data
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '1000m'
          livenessProbe:
            tcpSocket:
              port: 9333
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9333
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: seaweedfs-data
          persistentVolumeClaim:
            claimName: seaweedfs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: optimistic-tanuki
spec:
  selector:
    app: seaweedfs
  ports:
    - name: master
      port: 9333
      targetPort: 9333
    - name: volume
      port: 8333
      targetPort: 8333
    - name: s3
      port: 8888
      targetPort: 8888
  clusterIP: None
