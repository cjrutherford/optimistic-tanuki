apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: cjrutherford/optimistic_tanuki_gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 3300
              name: chat-ws
            - containerPort: 3301
              name: social-ws
          env:
            - name: NODE_ENV
              value: 'production'
            - name: LISTEN_PORT
              value: '3000'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: optimistic-tanuki-secrets
                  key: JWT_SECRET
                  optional: true
            - name: POSTGRES_HOST
              value: 'postgres'
            - name: POSTGRES_PORT
              value: '5432'
            - name: REDIS_HOST
              value: 'redis'
            - name: REDIS_PORT
              value: '6379'
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '1000m'
          livenessProbe:
            httpGet:
              path: /api/mcp/sse
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/mcp/sse
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: optimistic-tanuki
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: chat-ws
      port: 3300
      targetPort: 3300
    - name: social-ws
      port: 3301
      targetPort: 3301
  type: ClusterIP
