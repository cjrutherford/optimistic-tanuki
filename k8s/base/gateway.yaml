apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: cjrutherford/optimistic_tanuki_gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 3300
              name: chat-ws
            - containerPort: 3301
              name: social-ws
          env:
            - name: NODE_ENV
              value: 'production'
            - name: LISTEN_PORT
              value: '3000'
            - name: AUTHENTICATION_HOST
              value: 'authentication'
            - name: AUTHENTICATION_PORT
              value: '3001'
            - name: BLOGGING_HOST
              value: 'blogging'
            - name: BLOGGING_PORT
              value: '3011'
            - name: SOCIAL_HOST
              value: 'social'
            - name: SOCIAL_PORT
              value: '3003'
            - name: PROFILE_HOST
              value: 'profile'
            - name: PROFILE_PORT
              value: '3002'
            - name: ASSET_HOST
              value: 'asset'
            - name: ASSET_PORT
              value: '3005'
            - name: CHAT_COLLECTOR_HOST
              value: 'chat_collector'
            - name: CHAT_COLLECTOR_PORT
              value: '3007'
            - name: PERMISSIONS_HOST
              value: 'permissions'
            - name: PERMISSIONS_PORT
              value: '3012'
            - name: PROJECT_PLANNING_HOST
              value: 'project_planning'
            - name: PROJECT_PLANNING_PORT
              value: '3006'
            - name: TELOS_DOCS_SERVICE_HOST
              value: 'telos_docs_service'
            - name: TELOS_DOCS_SERVICE_PORT
              value: '3008'
            - name: AI_ORCHESTRATION_HOST
              value: 'ai_orchestration'
            - name: AI_ORCHESTRATION_PORT
              value: '3010'
            - name: APP_CONFIGURATOR_HOST
              value: 'app_configurator'
            - name: APP_CONFIGURATOR_PORT
              value: '3014'
            - name: STORE_HOST
              value: 'store'
            - name: STORE_PORT
              value: '3013'
            - name: FORUM_HOST
              value: 'forum'
            - name: FORUM_PORT
              value: '3015'
            - name: WELLNESS_HOST
              value: 'wellness'
            - name: WELLNESS_PORT
              value: '3016'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: optimistic-tanuki-secrets
                  key: JWT_SECRET
                  optional: true
            - name: POSTGRES_HOST
              value: 'postgres'
            - name: POSTGRES_PORT
              value: '5432'
            - name: REDIS_HOST
              value: 'redis'
            - name: REDIS_PORT
              value: '6379'
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '1000m'
          livenessProbe:
            httpGet:
              path: /api/mcp/sse
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/mcp/sse
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: optimistic-tanuki
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: chat-ws
      port: 3300
      targetPort: 3300
    - name: social-ws
      port: 3301
      targetPort: 3301
  type: ClusterIP
