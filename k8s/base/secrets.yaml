# =============================================================================
# THIS FILE MUST NEVER CONTAIN REAL SECRET VALUES.
#
# It is a placeholder template. `scripts/generate-secrets.sh` regenerates it
# locally from your gitignored `.secrets` file (see `.secrets.example`) and
# it is applied directly with `kubectl apply -f` (it is NOT part of the
# `k8s/base/kustomization.yaml` resource list, so `kustomize build` does not
# read it). Do not replace the REPLACE_ME_* placeholders below in a commit —
# generate real values locally and apply them to the cluster out of band.
#
# See docs/devops/secrets-management.md for how to provide real secrets per
# environment, and for the mandatory Tailscale OAuth credential rotation
# required because a real client secret was previously committed here.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: optimistic-tanuki-secrets
  namespace: optimistic-tanuki
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: REPLACE_ME_POSTGRES_PASSWORD
  JWT_SECRET: REPLACE_ME_JWT_SECRET
  OAUTH_STATE_SECRET: REPLACE_ME_OAUTH_STATE_SECRET
  LEMON_SQUEEZY_WEBHOOK_SECRET: ''
  S3_ACCESS_KEY: seaweedfs
  S3_SECRET_KEY: REPLACE_ME_S3_SECRET_KEY
  REDIS_PASSWORD:
  SMTP_HOST: mail.christopherrutherford.net
  SMTP_PORT: '465'
  SMTP_SECURE: 'true'
  SMTP_USER: ''
  SMTP_PASS: ''
  SMTP_FROM: no-reply@christopherrutherford.net
  TAILSCALE_OAUTH_CLIENT_ID: REPLACE_ME_TS_OAUTH_CLIENT_ID
  TAILSCALE_OAUTH_CLIENT_SECRET: REPLACE_ME_TS_OAUTH_CLIENT_SECRET
  TAILSCALE_FQDN: optimistic-tanuki.tail-scale.ts.net
