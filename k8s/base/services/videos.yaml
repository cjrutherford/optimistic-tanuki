apiVersion: apps/v1
kind: Deployment
metadata:
  name: videos
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: videos
  template:
    metadata:
      labels:
        app: videos
    spec:
      containers:
        - name: videos
          image: cjrutherford/optimistic_tanuki_videos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3022
          env:
            - name: POSTGRES_HOST
              value: 'postgres'
            - name: POSTGRES_PORT
              value: '5432'
            - name: POSTGRES_USER
              value: 'postgres'
            - name: POSTGRES_PASSWORD
              value: 'postgres'
            - name: POSTGRES_DB
              value: 'ot_videos'
            - name: PORT
              value: '3022'
            - name: VIDEO_SEED_SOURCE_DIR
              value: '/mnt/valhalla/media/TV'
            - name: ASSETS_HOST
              value: 'assets'
            - name: ASSETS_PORT
              value: '3005'
            - name: LOCAL_STORAGE_PATH
              value: '/usr/src/app/storage'
            - name: VIDEO_TRANSCODER_HOST
              value: 'video-transcoder-worker'
            - name: VIDEO_TRANSCODER_PORT
              value: '3023'
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          volumeMounts:
            - name: video-processing-data
              mountPath: /tmp/video-processing
          livenessProbe:
            tcpSocket:
              port: 3022
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3022
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: video-processing-data
          persistentVolumeClaim:
            claimName: video-processing-data
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: videos
  namespace: optimistic-tanuki
spec:
  selector:
    app: videos
  ports:
    - port: 3022
      targetPort: 3022
  clusterIP: None
