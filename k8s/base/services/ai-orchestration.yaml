apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestration
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-orchestration
  template:
    metadata:
      labels:
        app: ai-orchestration
    spec:
      containers:
        - name: ai-orchestration
          image: cjrutherford/optimistic_tanuki_ai-orchestration:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3010
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3010"
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: STORAGE_STRATEGY
              value: "network"
            - name: S3_ENDPOINT
              value: "http://seaweedfs:8888"
            - name: S3_BUCKET
              value: "assets"
          envFrom:
            - secretRef:
                name: optimistic-tanuki-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestration
  namespace: optimistic-tanuki
spec:
  selector:
    app: ai-orchestration
  ports:
    - port: 3010
      targetPort: 3010
  clusterIP: None
