apiVersion: apps/v1
kind: Deployment
metadata:
  name: telos-docs-service
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telos-docs-service
  template:
    metadata:
      labels:
        app: telos-docs-service
    spec:
      containers:
        - name: telos-docs-service
          image: cjrutherford/optimistic_tanuki_telos-docs-service:sha-ba689a99eff55870a8e7b676867b4679f6355306
          imagePullPolicy: Always
          ports:
            - containerPort: 3008
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3008"
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: STORAGE_STRATEGY
              value: "network"
            - name: S3_ENDPOINT
              value: "http://seaweedfs:8888"
            - name: S3_BUCKET
              value: "assets"
          envFrom:
            - secretRef:
                name: optimistic-tanuki-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 3008
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3008
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: telos-docs-service
  namespace: optimistic-tanuki
spec:
  selector:
    app: telos-docs-service
  ports:
    - port: 3008
      targetPort: 3008
  clusterIP: None
