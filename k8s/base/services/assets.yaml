apiVersion: apps/v1
kind: Deployment
metadata:
  name: assets
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assets
  template:
    metadata:
      labels:
        app: assets
    spec:
      containers:
        - name: assets
          image: cjrutherford/optimistic_tanuki_assets:sha-1d12c7afda88e22db8371f88f9923913309b6638
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3005'
            - name: POSTGRES_HOST
              value: 'postgres'
            - name: POSTGRES_PORT
              value: '5432'
            - name: REDIS_HOST
              value: 'redis'
            - name: REDIS_PORT
              value: '6379'
            - name: STORAGE_STRATEGY
              value: 'network'
            - name: LOCAL_STORAGE_PATH
              value: '/data/assets'
            - name: S3_ENDPOINT
              value: 'http://seaweedfs:8888'
            - name: S3_BUCKET
              value: 'assets'
            - name: S3_REGION
              value: 'us-east-1'
          envFrom:
            - secretRef:
                name: optimistic-tanuki-secrets
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            tcpSocket:
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: assets
  namespace: optimistic-tanuki
spec:
  selector:
    app: assets
  ports:
    - port: 3005
      targetPort: 3005
  clusterIP: None
