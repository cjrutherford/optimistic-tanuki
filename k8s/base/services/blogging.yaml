apiVersion: apps/v1
kind: Deployment
metadata:
  name: blogging
  namespace: optimistic-tanuki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blogging
  template:
    metadata:
      labels:
        app: blogging
    spec:
      containers:
        - name: blogging
          image: cjrutherford/optimistic_tanuki_blogging:sha-d72bb2e9ab4f08d92d24b313be33ac0df87ba408
          imagePullPolicy: Always
          ports:
            - containerPort: 3011
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3011"
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: STORAGE_STRATEGY
              value: "network"
            - name: S3_ENDPOINT
              value: "http://seaweedfs:8888"
            - name: S3_BUCKET
              value: "assets"
          envFrom:
            - secretRef:
                name: optimistic-tanuki-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 3011
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3011
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: blogging
  namespace: optimistic-tanuki
spec:
  selector:
    app: blogging
  ports:
    - port: 3011
      targetPort: 3011
  clusterIP: None
