name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'package.json'
      - 'nx.json'
      - 'docker-compose.yaml'
      - 'docker-compose.k8s.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: cjrutherford

jobs:
  determine-changes:
    name: Determine Changed Apps
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.filter.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apps:
              - 'apps/**'
              - 'libs/storage/**'
              - 'libs/database/**'
              - 'libs/models/**'
              - 'libs/logger/**'
          token: ${{ secrets.GITHUB_TOKEN }}

  build-backend:
    name: Build Backend Services
    needs: determine-changes
    if: needs.determine-changes.outputs.has_changes != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - authentication
          - profile
          - social
          - forum
          - chat-collector
          - assets
          - prompt-proxy
          - ai-orchestrator
          - telos-docs-service
          - blogging
          - permissions
          - project-planning
          - store
          - app-configurator
          - wellness
          - gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npx nx build ${{ matrix.app }} --configuration=production

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-clients:
    name: Build Client Apps
    needs: determine-changes
    if: needs.determine-changes.outputs.has_changes != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - client-interface
          - forgeofwill
          - digital-homestead
          - christopherrutherford-net
          - owner-console
          - store-client
          - configurable-client
          - d6
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-argocd-sync:
    name: Trigger ArgoCD Sync
    needs: [build-backend, build-clients]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create deployment tag file
        run: |
          echo "Deployment triggered at $(date)"
          echo "Git SHA: ${{ github.sha }}"
          echo "${{ github.sha }}" > DEPLOYMENT_TAG
          cat DEPLOYMENT_TAG

      - name: Commit deployment tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: Deployment trigger - ${{ github.sha }}'
          file_pattern: DEPLOYMENT_TAG
          push_arguments: '--force'

      - name: Install ArgoCD CLI
        if: false
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Setup kubectl
        if: false
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Sync ArgoCD application
        if: false
        run: |
          argocd login argocd.${{ secrets.DOMAIN }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure || true
          argocd app sync optimistic-tanuki --server argocd.${{ secrets.DOMAIN }} --insecure || true
        continue-on-error: true

  notify:
    name: Notify
    needs: [trigger-argocd-sync]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Success
        if: needs.trigger-argocd-sync.result == 'success'
        run: |
          echo "✅ Build and push completed!"
          echo "   Image tag: ${{ github.sha }}"
          echo "   ArgoCD will sync automatically on next poll (usually 3 minutes)"

      - name: Failure
        if: failure()
        run: |
          echo "❌ Build or push failed!"
          echo "   Check GitHub Actions logs for details."
