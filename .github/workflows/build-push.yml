name: Build, Push and Update Manifests

on:
  push:
    branches:
      - main
      - mvp-polish
    paths:
      - '.github/workflows/**'
      - 'apps/**'
      - 'docker-compose.k8s.yaml'
      - 'docker-compose.yaml'
      - 'k8s/**'
      - '!k8s/overlays/staging/**'
      - '!k8s/overlays/production/**'
      - 'libs/**'
      - 'nx.json'
      - 'package.json'
      - 'scripts/**'
      - 'tools/admin-env-wizard/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: cjrutherford

jobs:
  validate-deployment-contract:
    name: Validate Deployment Contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Go generator tests
        working-directory: tools/admin-env-wizard
        run: |
          GOCACHE=/tmp/go-build go test ./internal/catalog/...
          GOCACHE=/tmp/go-build go test ./internal/generate/...

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Validate workflow and k8s inventory
        run: DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json node scripts/validate-deployment-inventory.mjs

      - name: Validate compose and k8s parity
        run: bash scripts/validate-compose-k8s-parity.sh

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-24.04
    needs: [validate-deployment-contract]
    strategy:
      matrix:
        include:
          # Backend services
          - app: ai-orchestrator
            type: service
          - app: app-configurator
            type: service
          - app: assets
            type: service
          - app: authentication
            type: service
          - app: blogging
            type: service
          - app: chat-collector
            type: service
          - app: classifieds
            type: service
          - app: finance
            type: service
          - app: forum
            type: service
          - app: gateway
            type: service
          - app: lead-tracker
            type: service
          - app: payments
            type: service
          - app: permissions
            type: service
          - app: profile
            type: service
          - app: project-planning
            type: service
          - app: prompt-proxy
            type: service
          - app: social
            type: service
          - app: store
            type: service
          - app: system-configurator-api
            type: service
          - app: telos-docs-service
            type: service
          - app: wellness
            type: service
          # Client services
          - app: christopherrutherford-net
            type: client
          - app: client-interface
            type: client
          - app: configurable-client
            type: client
          - app: d6
            type: client
          - app: digital-homestead
            type: client
          - app: fin-commander
            type: client
          - app: forgeofwill
            type: client
          - app: hai
            type: client
          - app: leads-app
            type: client
          - app: local-hub
            type: client
          - app: marketing-generator
            type: client
          - app: owner-console
            type: client
          - app: store-client
            type: client
          - app: system-configurator
            type: client
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ github.ref != 'refs/heads/main' }}

      - name: Install dependencies
        if: matrix.type == 'service'
        run: pnpm install --frozen-lockfile

      - name: Build application
        if: matrix.type == 'service'
        run: pnpm exec nx build ${{ matrix.app }} --configuration=production

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-staging-overlay:
    name: Update Staging Overlay
    needs: [build-and-push]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Git config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Update staging overlay images with SHA tag
        run: |
          DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json \
          node scripts/update-k8s-overlay-images.mjs k8s/overlays/staging/kustomization.yaml sha-${{ github.sha }}

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update staging image tags to sha-${{ github.sha }}"
            git push origin ${{ github.ref_name }}
          fi

  notify:
    name: Notify
    needs: [update-staging-overlay]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Success
        if: needs.update-staging-overlay.result == 'success'
        run: |
          echo "✅ Build, push, and staging overlay update completed!"
          echo "   Git SHA: ${{ github.sha }}"
          echo "   ArgoCD will sync automatically (or manually trigger sync)"

      - name: Failure
        if: failure()
        run: |
          echo "❌ Build or manifest update failed!"
          echo "   Check GitHub Actions logs for details."
