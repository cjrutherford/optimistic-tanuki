name: Build, Push and Update Manifests

on:
  push:
    branches:
      - main
      - mvp-polish
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'package.json'
      - 'nx.json'
      - 'docker-compose.yaml'
      - 'docker-compose.k8s.yaml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: cjrutherford

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Backend services
          - app: authentication
            type: service
          - app: profile
            type: service
          - app: social
            type: service
          - app: forum
            type: service
          - app: chat-collector
            type: service
          - app: assets
            type: service
          - app: prompt-proxy
            type: service
          - app: ai-orchestrator
            type: service
          - app: telos-docs-service
            type: service
          - app: blogging
            type: service
          - app: permissions
            type: service
          - app: project-planning
            type: service
          - app: store
            type: service
          - app: app-configurator
            type: service
          - app: wellness
            type: service
          - app: gateway
            type: service
          # Client services
          - app: client-interface
            type: client
          - app: forgeofwill
            type: client
          - app: digital-homestead
            type: client
          - app: christopherrutherford-net
            type: client
          - app: owner-console
            type: client
          - app: store-client
            type: client
          - app: configurable-client
            type: client
          - app: d6
            type: client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ github.ref != 'refs/heads/main' }}

      - name: Install dependencies
        if: matrix.type == 'service'
        run: npm ci --legacy-peer-deps

      - name: Build application
        if: matrix.type == 'service'
        run: npx nx build ${{ matrix.app }} --configuration=production

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    name: Update K8s Manifests
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set Git config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Update images with SHA tag
        run: |
          SHA_TAG="${{ github.sha }}"

          # Update backend services
          for app in authentication profile social forum chat-collector assets prompt-proxy ai-orchestrator telos-docs-service blogging permissions project-planning store app-configurator wellness gateway; do
            if [ -f "k8s/base/services/$app.yaml" ]; then
              echo "Updating $app to sha-$SHA_TAG"
              sed -i "s|image: cjrutherford/optimistic_tanuki_$app:.*|image: cjrutherford/optimistic_tanuki_$app:sha-$SHA_TAG|" k8s/base/services/$app.yaml
            fi
          done

          # Update client services
          for app in client-interface forgeofwill digital-homestead christopherrutherford-net owner-console store-client configurable-client d6; do
            if [ -f "k8s/base/clients/$app.yaml" ]; then
              echo "Updating $app to sha-$SHA_TAG"
              sed -i "s|image: cjrutherford/optimistic_tanuki_$app:.*|image: cjrutherford/optimistic_tanuki_$app:sha-$SHA_TAG|" k8s/base/clients/$app.yaml
            fi
          done

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: Update container image tags to ${{ github.sha }}"
            git push origin ${{ github.ref_name }}
          fi

  notify:
    name: Notify
    needs: [update-manifests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Success
        if: needs.update-manifests.result == 'success'
        run: |
          echo "✅ Build, push, and manifest update completed!"
          echo "   Git SHA: ${{ github.sha }}"
          echo "   ArgoCD will sync automatically (or manually trigger sync)"

      - name: Failure
        if: failure()
        run: |
          echo "❌ Build or manifest update failed!"
          echo "   Check GitHub Actions logs for details."
