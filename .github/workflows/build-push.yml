name: Build, Push and Update Manifests

on:
  workflow_dispatch:
    inputs:
      force-all:
        description: Build and push every Docker image instead of diffing from a base ref
        type: boolean
        default: false
      base-ref:
        description: Optional git ref to diff against for manual runs when force-all is false
        type: string
        default: ''
  push:
    branches:
      - main
      - mvp-polish
    paths:
      - '.github/workflows/**'
      - 'apps/**'
      - 'docker-compose.k8s.yaml'
      - 'docker-compose.yaml'
      - 'k8s/**'
      - '!k8s/overlays/staging/**'
      - '!k8s/overlays/production/**'
      - 'libs/**'
      - 'nx.json'
      - 'package.json'
      - 'scripts/**'
      - 'tools/admin-env-wizard/**'
permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: cjrutherford
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-deployment-contract:
    name: Validate Deployment Contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Go generator tests
        working-directory: tools/admin-env-wizard
        run: |
          GOCACHE=/tmp/go-build go test ./internal/catalog/...
          GOCACHE=/tmp/go-build go test ./internal/generate/...

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Validate workflow and k8s inventory
        continue-on-error: true
        run: DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json node scripts/validate-deployment-inventory.mjs

      - name: Validate compose and k8s parity
        continue-on-error: true
        run: bash scripts/validate-compose-k8s-parity.sh

  determine-changes:
    name: Determine Changed Images
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      unchanged_apps: ${{ steps.matrix.outputs.unchanged_apps }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Restore Docker plan cache
        id: restore-plan
        uses: actions/cache/restore@v4
        with:
          path: tmp/docker-workflow/services.plan.json
          key: docker-plan-${{ github.sha }}-build-push
          restore-keys: |
            docker-plan-${{ github.sha }}-

      - name: Install dependencies
        if: steps.restore-plan.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Derive SHAs for docker planning
        if: steps.restore-plan.outputs.cache-hit != 'true' && github.event_name != 'workflow_dispatch'
        uses: nrwl/nx-set-shas@v4

      - name: Generate Docker change plan fallback
        if: steps.restore-plan.outputs.cache-hit != 'true'
        run: |
          mkdir -p tmp/docker-workflow
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.force-all }}" = "true" ]; then
              node scripts/docker-plan-services.mjs \
                --workspace-root "$PWD" \
                --compose-file docker-compose.yaml \
                --write-plan tmp/docker-workflow/services.plan.json \
                --force-all
            else
              BASE_REF="${{ github.event.inputs.base-ref }}"
              if [ -z "$BASE_REF" ]; then
                BASE_REF="$(git rev-parse HEAD^)"
              fi

              node scripts/docker-plan-services.mjs \
                --workspace-root "$PWD" \
                --compose-file docker-compose.yaml \
                --write-plan tmp/docker-workflow/services.plan.json \
                --base-ref "$BASE_REF" \
                --head-ref "${GITHUB_SHA}"
            fi
          else
            node scripts/docker-plan-services.mjs \
              --workspace-root "$PWD" \
              --compose-file docker-compose.yaml \
              --write-plan tmp/docker-workflow/services.plan.json \
              --base-ref "${{ env.NX_BASE }}" \
              --head-ref "${{ env.NX_HEAD }}"
          fi

      - name: Resolve changed app matrix
        id: matrix
        run: |
          node scripts/resolve-docker-changes.mjs \
            --plan-file tmp/docker-workflow/services.plan.json \
            --compose-file docker-compose.yaml

      - name: Upload Docker plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-plan
          path: tmp/docker-workflow/services.plan.json
          retention-days: 7

      - name: Save Docker plan cache
        if: steps.restore-plan.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tmp/docker-workflow/services.plan.json
          key: docker-plan-${{ github.sha }}-build-push

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-24.04
    needs: [validate-deployment-contract, determine-changes]
    if: needs.determine-changes.outputs.has_changes == 'true'
    strategy:
      max-parallel: 4
      matrix: ${{ fromJson(needs.determine-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ github.ref != 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  retag-unchanged:
    name: Retag Unchanged Images
    runs-on: ubuntu-24.04
    needs: [validate-deployment-contract, determine-changes, build-and-push]
    if: needs.determine-changes.outputs.has_changes == 'true' && needs.determine-changes.outputs.unchanged_apps != '[]'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        app: ${{ fromJson(needs.determine-changes.outputs.unchanged_apps) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ github.ref != 'refs/heads/main' }}

      - name: Get previous successful workflow run
        id: prev-run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-push.yml',
              branch: context.ref.replace('refs/heads/', ''),
              status: 'success',
              per_page: 10
            });
            const currentSha = context.sha;
            const prev = runs.find((run) => run.head_sha !== currentSha);
            core.setOutput('sha', prev ? prev.head_sha : '');

      - name: Retag unchanged image to current tags
        if: steps.prev-run.outputs.sha != ''
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}
          PREVIOUS_SHA: ${{ steps.prev-run.outputs.sha }}
          CURRENT_SHA: ${{ github.sha }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          SOURCE_IMAGE="${IMAGE_NAME}:sha-${PREVIOUS_SHA}"
          docker pull "$SOURCE_IMAGE"

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag "$SOURCE_IMAGE" "$tag"
            docker push "$tag"
          done <<EOF
          $TAGS
          EOF

  update-staging-overlay:
    name: Update Staging Overlay
    needs: [build-and-push, retag-unchanged]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.retag-unchanged.result == 'success' || needs.retag-unchanged.result == 'skipped')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Git config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Update staging overlay images with SHA tag
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json \
          node scripts/update-k8s-overlay-images.mjs k8s/overlays/staging/kustomization.yaml "$IMAGE_TAG"

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update staging image tags to sha-${GITHUB_SHA::7}"
            git push origin ${{ github.ref_name }}
          fi

  notify:
    name: Notify
    needs: [determine-changes, update-staging-overlay]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: No-op
        if: needs.determine-changes.outputs.has_changes != 'true'
        run: |
          echo "No Docker image changes detected for this revision."

      - name: Success
        if: needs.determine-changes.outputs.has_changes == 'true' && needs.update-staging-overlay.result == 'success'
        run: |
          echo "✅ Build, push, and staging overlay update completed!"
          echo "   Git SHA: ${{ github.sha }}"
          echo "   ArgoCD will sync automatically (or manually trigger sync)"

      - name: Failure
        if: needs.determine-changes.outputs.has_changes == 'true' && failure()
        run: |
          echo "❌ Build or manifest update failed!"
          echo "   Check GitHub Actions logs for details."
