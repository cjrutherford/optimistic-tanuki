name: Capture Angular Screenshots

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday at midnight

permissions:
  contents: read

jobs:
  capture-screenshots:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        app:
          - name: client-interface
            port: 4200
          - name: forgeofwill
            port: 4201
          - name: christopherrutherford-net
            port: 4202
          - name: digital-homestead
            port: 4203

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Build application
        run: pnpm exec nx build ${{ matrix.app.name }} --configuration=production

      - name: Start application
        run: |
          pnpm exec nx serve ${{ matrix.app.name }} --port=${{ matrix.app.port }} &
          # Wait for server to be ready
          timeout 120 bash -c 'until curl -s http://localhost:${{ matrix.app.port }} > /dev/null; do sleep 2; done'
        env:
          NODE_ENV: production

      - name: Capture screenshots
        run: |
          cd tools/screenshots
          BASE_URL="http://localhost:${{ matrix.app.port }}" APP_NAME="${{ matrix.app.name }}" pnpm exec playwright test --grep="${{ matrix.app.name }}" --config=playwright.config.ts
        continue-on-error: true

      - name: Upload screenshots
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: screenshots-${{ matrix.app.name }}
          path: screenshots/${{ matrix.app.name }}/
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-${{ matrix.app.name }}
          path: tools/screenshots/playwright-report/
          retention-days: 7

  generate-report:
    needs: capture-screenshots
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all screenshots
        uses: actions/download-artifact@v8
        with:
          pattern: screenshots-*
          path: screenshots/
          merge-multiple: true

      - name: Generate features breakdown
        run: |
          cd tools/screenshots
          chmod +x generate-features-report.sh
          ./generate-features-report.sh

      - name: Upload features breakdown
        uses: actions/upload-artifact@v6
        with:
          name: features-breakdown
          path: FEATURES_BREAKDOWN.md
          retention-days: 30
