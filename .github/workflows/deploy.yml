name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all projects for production
        run: npx nx run-many -t build --configuration=production --all --parallel=3
        env:
          CI: true
          NODE_ENV: production

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          # Tag images with commit SHA and staging tag
          export IMAGE_TAG="${GITHUB_SHA:0:7}-staging"

          # Build and push all services
          docker compose build
          docker compose push
        env:
          CI: true

      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment commands here
          # Example: kubectl apply -f k8s/staging/
          # Example: docker stack deploy or docker-compose up on staging server
        env:
          DEPLOY_ENV: staging

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Add smoke test commands
          # Example: curl https://staging.example.com/health
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all projects for production
        run: npx nx run-many -t build --configuration=production --all --parallel=3
        env:
          CI: true
          NODE_ENV: production

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          # Tag images with commit SHA and latest tag
          export IMAGE_TAG="${GITHUB_SHA:0:7}"

          # Build and push all services
          docker compose build
          docker compose push

          # Also tag as latest
          docker compose build
          docker tag $(docker images -q | head -1) latest
          docker compose push
        env:
          CI: true

      - name: Deploy to production environment
        run: |
          echo "Deploying to production environment..."
          # Add your deployment commands here
          # Example: kubectl apply -f k8s/production/
          # Example: Blue-green deployment strategy
        env:
          DEPLOY_ENV: production

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against production..."
          # Add smoke test commands
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated production deployment
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
