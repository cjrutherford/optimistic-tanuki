name: Deploy

on:
  push:
    branches:
      - main
      - mvp-polish
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write
  id-token: write

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-24.04
    environment: staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: argocd login argocd.${{ secrets.DOMAIN }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

      - name: Apply ArgoCD Application for staging
        run: |
          sed \
            -e "s|\${ARGO_APP_NAME:-optimistic-tanuki}|optimistic-tanuki-staging|g" \
            -e "s|\${ARGO_NAMESPACE:-optimistic-tanuki}|optimistic-tanuki-staging|g" \
            -e "s|\${ARGO_REPO_URL:-https://github.com/cjrutherford/optimistic-tanuki.git}|https://github.com/cjrutherford/optimistic-tanuki.git|g" \
            -e "s|\${ARGO_TARGET_REVISION:-main}|${GITHUB_REF_NAME}|g" \
            -e "s|\${ARGO_ENV:-production}|staging|g" \
            k8s/argo-app/application.yaml | kubectl apply -f -

      - name: Sync staging application
        run: argocd app sync optimistic-tanuki-staging --server argocd.${{ secrets.DOMAIN }} --insecure --timeout 600

      - name: Wait for staging deployment
        run: argocd app wait optimistic-tanuki-staging --server argocd.${{ secrets.DOMAIN }} --insecure --timeout 600

      - name: Run staging smoke test
        run: |
          sleep 30
          curl -f "https://staging.${{ secrets.DOMAIN }}/api/mcp/sse"

  deploy-production:
    name: Promote and Deploy Production
    runs-on: ubuntu-24.04
    environment: production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Update production overlay images
        run: |
          DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json \
          node scripts/update-k8s-overlay-images.mjs k8s/overlays/production/kustomization.yaml sha-${{ github.sha }}

      - name: Commit production overlay update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/overlays/production/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No production overlay changes to commit"
          else
            git commit -m "ci: promote production image tags to sha-${{ github.sha }}"
            git push origin ${{ github.ref_name }}
          fi

      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: argocd login argocd.${{ secrets.DOMAIN }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

      - name: Apply ArgoCD Application for production
        run: |
          sed \
            -e "s|\${ARGO_APP_NAME:-optimistic-tanuki}|optimistic-tanuki|g" \
            -e "s|\${ARGO_NAMESPACE:-optimistic-tanuki}|optimistic-tanuki|g" \
            -e "s|\${ARGO_REPO_URL:-https://github.com/cjrutherford/optimistic-tanuki.git}|https://github.com/cjrutherford/optimistic-tanuki.git|g" \
            -e "s|\${ARGO_TARGET_REVISION:-main}|${GITHUB_REF_NAME}|g" \
            -e "s|\${ARGO_ENV:-production}|production|g" \
            k8s/argo-app/application.yaml | kubectl apply -f -

      - name: Sync production application
        run: argocd app sync optimistic-tanuki --server argocd.${{ secrets.DOMAIN }} --insecure --timeout 600

      - name: Wait for production deployment
        run: argocd app wait optimistic-tanuki --server argocd.${{ secrets.DOMAIN }} --insecure --timeout 600

      - name: Run production smoke test
        run: |
          sleep 30
          curl -f "https://${{ secrets.DOMAIN }}/api/mcp/sse"

  notify:
    name: Notify
    runs-on: ubuntu-24.04
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Send notification on failure
        if: contains(needs.*.result, 'failure')
        run: echo "Deployment failed. Check workflow logs for details."
