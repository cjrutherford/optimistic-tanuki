name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-production:
    name: Promote and Deploy Production
    runs-on: ubuntu-24.04
    environment: production
    if: github.event.inputs.environment == 'production' && secrets.KUBECONFIG != '' && secrets.DOMAIN != '' && secrets.ARGOCD_PASSWORD != ''
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Update production overlay images
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json \
          node scripts/update-k8s-overlay-images.mjs k8s/overlays/production/kustomization.yaml "$IMAGE_TAG"

      - name: Commit production overlay update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/overlays/production/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No production overlay changes to commit"
          else
            git commit -m "ci: promote production image tags to sha-${GITHUB_SHA::7}"
            git push origin ${{ github.ref_name }}
          fi

      - name: Setup kubectl
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: argocd login argocd.${{ secrets.DOMAIN }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

      - name: Resolve production deployment workspace context
        run: |
          DEPLOYMENT_NAME=production ARGO_ENV=production node scripts/lib/deployment-workspace-context.mjs > /tmp/production-workspace-context.json
          echo "ARGOCD_APP_FILE=$(node -e "const fs=require('fs'); const context=JSON.parse(fs.readFileSync('/tmp/production-workspace-context.json','utf8')); process.stdout.write(context.argocdAppFile)")" >> "$GITHUB_ENV"
          echo "ARGOCD_APP_NAME=$(node -e "const fs=require('fs'); const context=JSON.parse(fs.readFileSync('/tmp/production-workspace-context.json','utf8')); process.stdout.write(context.appName)")" >> "$GITHUB_ENV"

      - name: Apply ArgoCD Application for production
        run: |
          if grep -q 'dist/admin-env/production/k8s' "$ARGOCD_APP_FILE"; then
            kubectl apply -f "$ARGOCD_APP_FILE"
          else
            sed \
              -e "s|\${ARGO_APP_NAME:-optimistic-tanuki}|optimistic-tanuki|g" \
              -e "s|\${ARGO_NAMESPACE:-optimistic-tanuki}|optimistic-tanuki|g" \
              -e "s|\${ARGO_REPO_URL:-https://github.com/cjrutherford/optimistic-tanuki.git}|https://github.com/cjrutherford/optimistic-tanuki.git|g" \
              -e "s|\${ARGO_TARGET_REVISION:-main}|${GITHUB_REF_NAME}|g" \
              -e "s|\${ARGO_ENV:-production}|production|g" \
              "$ARGOCD_APP_FILE" | kubectl apply -f -
          fi

      - name: Sync production application
        run: argocd app sync "$ARGOCD_APP_NAME" --server argocd.${{ secrets.DOMAIN }} --insecure --timeout 600

      - name: Wait for production deployment
        run: argocd app wait "$ARGOCD_APP_NAME" --server argocd.${{ secrets.DOMAIN }} --insecure --timeout 600

      - name: Run production smoke test
        run: |
          sleep 30
          curl -f "https://${{ secrets.DOMAIN }}/api/mcp/sse"

  notify:
    name: Notify
    runs-on: ubuntu-24.04
    needs: [deploy-production]
    if: always()
    steps:
      - name: Send notification on failure
        if: contains(needs.*.result, 'failure')
        run: echo "Deployment failed. Check workflow logs for details."
