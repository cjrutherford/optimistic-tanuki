name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: cjrutherford/optimistic_tanuki
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.sha }}

      - name: Build and push backend services
        run: |
          export IMAGE_TAG="${GITHUB_SHA}"

          npm install --legacy-peer-deps

          npx nx build-many -t build --configuration=production --all --parallel=3

          docker compose -f docker-compose.k8s.yaml build
          docker compose -f docker-compose.k8s.yaml push

        env:
          CI: true
          NODE_ENV: production

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: build
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login argocd.${{ secrets.DOMAIN }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

      - name: Sync staging application
        run: |
          argocd app sync optimistic-tanuki --server argocd.${{ secrets.DOMAIN }} --insecure || \
          argocd app create optimistic-tanuki \
            --repo https://github.com/cjrutherford/optimistic-tanuki.git \
            --path k8s/overlays/staging \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace optimistic-tanuki \
            --server argocd.${{ secrets.DOMAIN }} \
            --insecure

      - name: Wait for deployment
        run: |
          argocd app wait optimistic-tanuki --server argocd.${{ secrets.DOMAIN }} --insecure

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          sleep 30
          curl -f "https://staging.${{ secrets.DOMAIN }}/api/mcp/sse" || exit 1
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: [build, deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login argocd.${{ secrets.DOMAIN }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

      - name: Sync production application
        run: |
          argocd app sync optimistic-tanuki \
            --server argocd.${{ secrets.DOMAIN }} \
            --insecure \
            --timeout 600

      - name: Wait for deployment
        run: |
          argocd app wait optimistic-tanuki --server argocd.${{ secrets.DOMAIN }} --insecure

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against production..."
          sleep 30
          curl -f "https://${{ secrets.DOMAIN }}/api/mcp/sse" || exit 1
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Send notification on failure
        if: failure()
        run: |
          echo "Deployment failed! Sending notification..."
