name: Build

on:
  pull_request:
    branches: [main, develop, mvp-polish]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-plan:
    name: Docker Plan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head for docker planning
        if: github.event_name != 'workflow_dispatch'
        uses: nrwl/nx-set-shas@v4

      - name: Generate Docker change plan
        run: |
          mkdir -p tmp/docker-workflow
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/docker-plan-services.mjs \
              --workspace-root "$PWD" \
              --compose-file docker-compose.yaml \
              --write-plan tmp/docker-workflow/services.plan.json \
              --force-all
          else
            node scripts/docker-plan-services.mjs \
              --workspace-root "$PWD" \
              --compose-file docker-compose.yaml \
              --write-plan tmp/docker-workflow/services.plan.json \
              --base-ref "${{ env.NX_BASE }}" \
              --head-ref "${{ env.NX_HEAD }}"
          fi

      - name: Resolve changed app matrix
        id: matrix
        run: |
          MATRIX=$(node --input-type=module -e "import fs from 'node:fs'; import { resolveDockerBuildMatrix } from './scripts/lib/docker-build-matrix.mjs'; const plan = JSON.parse(fs.readFileSync('tmp/docker-workflow/services.plan.json', 'utf8')); process.stdout.write(JSON.stringify(resolveDockerBuildMatrix({ buildApps: plan.buildApps || [] })));")
          HAS_CHANGES=$(node --input-type=module -e "import fs from 'node:fs'; const plan = JSON.parse(fs.readFileSync('tmp/docker-workflow/services.plan.json', 'utf8')); process.stdout.write((plan.buildApps || []).length > 0 ? 'true' : 'false');")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

      - name: Upload Docker plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-plan
          path: tmp/docker-workflow/services.plan.json
          retention-days: 7

      - name: Save Docker plan cache
        uses: actions/cache/save@v4
        with:
          path: tmp/docker-workflow/services.plan.json
          key: docker-plan-${{ github.sha }}-build

  build:
    name: Build (all)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head for nx affected commands
        uses: nrwl/nx-set-shas@v5

      - name: Build all projects
        run: pnpm exec nx run-many -t build --configuration=production --parallel=3 --outputStyle=static
        env:
          CI: true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  build-all:
    name: Build (All - Weekly)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Only run on schedule or manual trigger
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all projects
        run: pnpm exec nx run-many -t build --configuration=production --parallel=3 --outputStyle=static
        env:
          CI: true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts-all
          path: dist/
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    if: github.event_name == 'pull_request'
    needs: [docker-plan]

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.docker-plan.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Docker plan artifact
        uses: actions/download-artifact@v6
        with:
          name: docker-plan
          path: tmp/docker-workflow

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Skip when no app changes were detected
        if: needs.docker-plan.outputs.has_changes != 'true'
        run: echo "No Docker-relevant app changes detected"

      - name: Build Docker image for ${{ matrix.app }}
        if: needs.docker-plan.outputs.has_changes == 'true'
        run: |
          docker build \
            -f apps/${{ matrix.app }}/Dockerfile \
            -t ot-${{ matrix.app }}:ci \
            .
        env:
          CI: true

      - name: Verify Docker image was built
        if: needs.docker-plan.outputs.has_changes == 'true'
        run: docker images ot-${{ matrix.app }}:ci
