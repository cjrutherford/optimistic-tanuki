name: Build

on:
  pull_request:
    branches: [main, develop, mvp-polish]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build (all)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head for nx affected commands
        uses: nrwl/nx-set-shas@v4

      - name: Build all projects
        run: pnpm exec nx run-many -t build --configuration=production --parallel=3 --outputStyle=static
        env:
          CI: true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  build-all:
    name: Build (All - Weekly)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Only run on schedule or manual trigger
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all projects
        run: pnpm exec nx run-many -t build --configuration=production --parallel=3 --outputStyle=static
        env:
          CI: true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts-all
          path: dist/
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        service:
          - authentication
          - finance
          - fin-commander
          - gateway
          - profile
          - social
          - assets
          - blogging
          - project-planning
          - permissions
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ${{ matrix.service }}
        run: |
          docker build \
            -f apps/${{ matrix.service }}/Dockerfile \
            -t ot-${{ matrix.service }}:ci \
            .
        env:
          CI: true

      - name: Verify Docker image was built
        run: docker images ot-${{ matrix.service }}:ci
