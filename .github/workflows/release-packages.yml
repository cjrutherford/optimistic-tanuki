name: Validate Public Packages

on:
  pull_request:
    branches: [main]
    paths:
      - '.changeset/**'
      - '.github/workflows/release-packages.yml'
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'scripts/public-package-registry.mjs'
      - 'scripts/validate-publishable-packages.mjs'
      - 'tsconfig.base.json'
      - 'tools/public-packages/**'
  push:
    branches: [main]
    paths:
      - '.changeset/**'
      - '.github/workflows/release-packages.yml'
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'scripts/public-package-registry.mjs'
      - 'scripts/validate-publishable-packages.mjs'
      - 'tsconfig.base.json'
      - 'tools/public-packages/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-public-packages-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  validate-packages:
    name: Validate Publishable Packages
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test publishable packages
        run: pnpm run packages:test

      - name: Check public package boundaries
        run: pnpm run packages:check

      - name: Build publishable packages
        run: pnpm run packages:build

      - name: Upload package build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: package-build-artifacts
          path: |
            dist/libs
          retention-days: 7
