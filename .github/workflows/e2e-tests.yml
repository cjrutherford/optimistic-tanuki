name: E2E Tests

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:

# Limit default permissions for security
permissions:
  contents: read
  actions: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build all applications once, cache the dist output as an artifact
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build All Applications
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all applications
        run: pnpm exec nx run-many -t build --parallel=4 --outputStyle=static
        env:
          CI: true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Microservice E2E tests — all suites run sequentially on one runner
  # using the shared infrastructure stack
  # ──────────────────────────────────────────────────────────────────────────
  microservices-e2e:
    name: Microservices E2E Tests
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start shared infrastructure stack
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml up -d \
            db redis db-setup \
            authentication profile social assets \
            project-planning chat-collector telos-docs-service prompt-proxy \
            ai-orchestrator blogging permissions store app-configurator \
            app-configurator-seed lead-tracker gateway
          echo "Waiting for infrastructure to be ready..."
          sleep 60
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps
        env:
          CI: true

      - name: Run authentication-e2e
        run: pnpm exec nx e2e authentication-e2e --configuration=ci
        env:
          CI: true

      - name: Run profile-e2e
        run: pnpm exec nx e2e profile-e2e --configuration=ci
        env:
          CI: true

      - name: Run social-e2e
        run: pnpm exec nx e2e social-e2e --configuration=ci
        env:
          CI: true

      - name: Run assets-e2e
        run: pnpm exec nx e2e assets-e2e --configuration=ci
        env:
          CI: true

      - name: Run blogging-e2e
        run: pnpm exec nx e2e blogging-e2e --configuration=ci
        env:
          CI: true

      - name: Run gateway-e2e
        run: pnpm exec nx e2e gateway-e2e --configuration=ci
        env:
          CI: true

      - name: Run permissions-e2e
        run: pnpm exec nx e2e permissions-e2e --configuration=ci
        env:
          CI: true

      - name: Run project-planning-e2e
        run: pnpm exec nx e2e project-planning-e2e --configuration=ci
        env:
          CI: true

      - name: Run chat-collector-e2e
        run: pnpm exec nx e2e chat-collector-e2e --configuration=ci
        env:
          CI: true

      - name: Run prompt-proxy-e2e
        run: pnpm exec nx e2e prompt-proxy-e2e --configuration=ci
        env:
          CI: true

      - name: Run telos-docs-service-e2e
        run: pnpm exec nx e2e telos-docs-service-e2e --configuration=ci
        env:
          CI: true

      - name: Run ai-orchestrator-e2e
        run: pnpm exec nx e2e ai-orchestrator-e2e --configuration=ci
        env:
          CI: true

      - name: Run app-configurator-e2e
        run: pnpm exec nx e2e app-configurator-e2e --configuration=ci
        env:
          CI: true

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          docker compose -f e2e/docker-compose.e2e-stack.yaml logs > docker-logs/microservices-stack.log
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps > docker-logs/microservices-status.txt

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: docker-logs-microservices
          path: docker-logs/
          retention-days: 7

      - name: Stop shared infrastructure stack
        if: always()
        run: docker compose -f e2e/docker-compose.e2e-stack.yaml down -v

      - name: Upload microservices test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-microservices
          path: |
            coverage/
            test-results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # UI E2E tests — each app is started via Docker Compose profile, tested,
  # then stopped. All suites share the same backend infrastructure.
  # ──────────────────────────────────────────────────────────────────────────
  ui-e2e:
    name: UI E2E Tests
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Start shared backend infrastructure
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml up -d \
            db redis db-setup \
            authentication profile social assets \
            project-planning chat-collector telos-docs-service prompt-proxy \
            blogging permissions store app-configurator \
            app-configurator-seed lead-tracker gateway
          echo "Waiting for backend infrastructure to be ready..."
          sleep 60
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps
        env:
          CI: true

      # ── client-interface ────────────────────────────────────────────────
      - name: Start client-interface app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile client-interface up -d client-interface
          sleep 20
        env:
          CI: true

      - name: Run client-interface-e2e
        run: pnpm exec nx e2e client-interface-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8080

      - name: Stop client-interface app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile client-interface stop client-interface
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile client-interface rm -f client-interface

      # ── forgeofwill ─────────────────────────────────────────────────────
      - name: Start forgeofwill app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile forgeofwill up -d forgeofwill
          sleep 20
        env:
          CI: true

      - name: Run forgeofwill-e2e
        run: pnpm exec nx e2e forgeofwill-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8081

      - name: Stop forgeofwill app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile forgeofwill stop forgeofwill
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile forgeofwill rm -f forgeofwill

      # ── digital-homestead ───────────────────────────────────────────────
      - name: Start digital-homestead app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile digital-homestead up -d digital-homestead
          sleep 20
        env:
          CI: true

      - name: Run digital-homestead-e2e
        run: pnpm exec nx e2e digital-homestead-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8082

      - name: Stop digital-homestead app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile digital-homestead stop digital-homestead
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile digital-homestead rm -f digital-homestead

      # ── christopherrutherford-net ────────────────────────────────────────
      - name: Start christopherrutherford-net app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile christopherrutherford-net up -d christopherrutherford-net
          sleep 20
        env:
          CI: true

      - name: Run christopherrutherford-net-e2e
        run: pnpm exec nx e2e christopherrutherford-net-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8083

      - name: Stop christopherrutherford-net app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile christopherrutherford-net stop christopherrutherford-net
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile christopherrutherford-net rm -f christopherrutherford-net

      # ── owner-console ────────────────────────────────────────────────────
      - name: Start owner-console app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile owner-console up -d owner-console
          sleep 20
        env:
          CI: true

      - name: Run owner-console-e2e
        run: pnpm exec nx e2e owner-console-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8084

      - name: Stop owner-console app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile owner-console stop owner-console
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile owner-console rm -f owner-console

      # ── store-client ─────────────────────────────────────────────────────
      - name: Start store-client app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile store-client up -d store-client
          sleep 20
        env:
          CI: true

      - name: Run store-client-e2e
        run: pnpm exec nx e2e store-client-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8085

      - name: Stop store-client app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile store-client stop store-client
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile store-client rm -f store-client

      # ── configurable-client ───────────────────────────────────────────────
      - name: Start configurable-client app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile configurable-client up -d configurable-client
          sleep 20
        env:
          CI: true

      - name: Run configurable-client-e2e
        run: pnpm exec nx e2e configurable-client-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8090

      - name: Stop configurable-client app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile configurable-client stop configurable-client
          docker compose -f e2e/docker-compose.e2e-stack.yaml \
            --profile configurable-client rm -f configurable-client

      # ── Cleanup ──────────────────────────────────────────────────────────
      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          docker compose -f e2e/docker-compose.e2e-stack.yaml logs > docker-logs/ui-stack.log
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps > docker-logs/ui-status.txt

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: docker-logs-ui
          path: docker-logs/
          retention-days: 7

      - name: Stop shared backend infrastructure
        if: always()
        run: docker compose -f e2e/docker-compose.e2e-stack.yaml down -v

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-reports-ui
          path: dist/.playwright/apps/*/playwright-report
          retention-days: 30

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-ui
          path: test-results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Test Summary
  # ──────────────────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-24.04
    needs: [microservices-e2e, ui-e2e]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display test results
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Microservices Tests" >> $GITHUB_STEP_SUMMARY
          ls -la artifacts/test-results-microservices/ 2>/dev/null || echo "No microservice results found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### UI Tests" >> $GITHUB_STEP_SUMMARY
          ls -la artifacts/playwright-reports-ui/ 2>/dev/null || echo "No UI test results found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check test status
        run: |
          FAILED=false

          if [ "${{ needs.microservices-e2e.result }}" != "success" ]; then
            echo "FAIL Microservices E2E: ${{ needs.microservices-e2e.result }}"
            FAILED=true
          else
            echo "PASS Microservices E2E: passed"
          fi

          if [ "${{ needs.ui-e2e.result }}" != "success" ]; then
            echo "FAIL UI E2E: ${{ needs.ui-e2e.result }}"
            FAILED=true
          else
            echo "PASS UI E2E: passed"
          fi

          if [ "$FAILED" = true ]; then
            echo ""
            echo "FAIL Some E2E tests failed"
            exit 1
          else
            echo ""
            echo "PASS All E2E tests passed!"
            exit 0
          fi
