name: yci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - uses: nrwl/nx-set-shas@v4

      - run: npx nx affected -t lint --parallel=3 --maxParallel=3 --exclude='*-e2e'
      - run: npx nx affected -t build --parallel=3 --maxParallel=3
      - run: npx nx affected -t test --passWithNoTests=true
