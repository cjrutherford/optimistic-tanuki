name: CI/CD

on:
  pull_request:
    branches:
      - main
      - develop
      - mvp-polish
  push:
    branches:
      - main
      - develop
      - mvp-polish
  workflow_dispatch:
    inputs:
      run_docker:
        description: Run Docker image check and related container stages
        required: false
        default: true
        type: boolean
      publish_images:
        description: Push Docker images for this manual run
        required: false
        default: false
        type: boolean
      run_e2e:
        description: Run e2e suites after Docker stages
        required: false
        default: true
        type: boolean
      run_performance:
        description: Run performance jobs after e2e
        required: false
        default: false
        type: boolean
      docker_force_all:
        description: Force all Docker images to rebuild for this manual run
        required: false
        default: false
        type: boolean
      docker_base_ref:
        description: Optional git ref to diff against for manual Docker planning when force-all is false
        required: false
        default: ''
        type: string
      deploy_staging:
        description: Deploy staging after publish and e2e
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  checks: write
  contents: write
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NX_DAEMON: false
  NX_ISOLATE_PLUGINS: false
  REGISTRY: docker.io
  IMAGE_NAME: cjrutherford

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-24.04
    outputs:
      changed_matrix: ${{ steps.matrix.outputs.changed_matrix }}
      changed_has_changes: ${{ steps.matrix.outputs.changed_has_changes }}
      full_matrix: ${{ steps.matrix.outputs.full_matrix }}
      run_docker: ${{ steps.flags.outputs.run_docker }}
      publish_images: ${{ steps.flags.outputs.publish_images }}
      run_e2e: ${{ steps.flags.outputs.run_e2e }}
      run_performance: ${{ steps.flags.outputs.run_performance }}
      deploy_staging: ${{ steps.flags.outputs.deploy_staging }}
      image_tag: ${{ steps.flags.outputs.image_tag }}
      e2e_image_tag: ${{ steps.flags.outputs.e2e_image_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive SHAs for affected planning
        if: github.event_name != 'workflow_dispatch'
        uses: nrwl/nx-set-shas@v4

      - name: Generate changed Docker plan
        run: |
          mkdir -p tmp/docker-workflow
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.docker_force_all }}" = "true" ]; then
              node scripts/docker-plan-services.mjs \
                --workspace-root "$PWD" \
                --compose-file docker-compose.yaml \
                --write-plan tmp/docker-workflow/changed.plan.json \
                --force-all
            else
              BASE_REF="${{ github.event.inputs.docker_base_ref }}"
              if [ -z "$BASE_REF" ]; then
                BASE_REF="$(git rev-parse HEAD^)"
              fi

              node scripts/docker-plan-services.mjs \
                --workspace-root "$PWD" \
                --compose-file docker-compose.yaml \
                --write-plan tmp/docker-workflow/changed.plan.json \
                --base-ref "$BASE_REF" \
                --head-ref "${GITHUB_SHA}"
            fi
          else
            node scripts/docker-plan-services.mjs \
              --workspace-root "$PWD" \
              --compose-file docker-compose.yaml \
              --write-plan tmp/docker-workflow/changed.plan.json \
              --base-ref "${{ env.NX_BASE }}" \
              --head-ref "${{ env.NX_HEAD }}"
          fi

      - name: Generate full Docker plan
        run: |
          node scripts/docker-plan-services.mjs \
            --workspace-root "$PWD" \
            --compose-file docker-compose.yaml \
            --write-plan tmp/docker-workflow/full.plan.json \
            --force-all

      - name: Resolve plan matrices
        id: matrix
        run: |
          CHANGED_MATRIX=$(node --input-type=module -e "import fs from 'node:fs'; import { resolveDockerBuildMatrix } from './scripts/lib/docker-build-matrix.mjs'; const plan = JSON.parse(fs.readFileSync('tmp/docker-workflow/changed.plan.json', 'utf8')); process.stdout.write(JSON.stringify(resolveDockerBuildMatrix({ buildApps: plan.buildApps || [] })));")
          FULL_MATRIX=$(node --input-type=module -e "import fs from 'node:fs'; import { resolveDockerBuildMatrix } from './scripts/lib/docker-build-matrix.mjs'; const plan = JSON.parse(fs.readFileSync('tmp/docker-workflow/full.plan.json', 'utf8')); process.stdout.write(JSON.stringify(resolveDockerBuildMatrix({ buildApps: plan.buildApps || [] })));")
          CHANGED_HAS_CHANGES=$(node --input-type=module -e "import fs from 'node:fs'; const plan = JSON.parse(fs.readFileSync('tmp/docker-workflow/changed.plan.json', 'utf8')); process.stdout.write((plan.buildApps || []).length > 0 ? 'true' : 'false');")
          echo "changed_matrix=$CHANGED_MATRIX" >> "$GITHUB_OUTPUT"
          echo "full_matrix=$FULL_MATRIX" >> "$GITHUB_OUTPUT"
          echo "changed_has_changes=$CHANGED_HAS_CHANGES" >> "$GITHUB_OUTPUT"

      - name: Resolve publish and deploy flags
        id: flags
        run: |
          SHORT_SHA="sha-${GITHUB_SHA::7}"
          RUN_DOCKER=true
          RUN_E2E=true
          RUN_PERFORMANCE=false
          PUBLISH_IMAGES=false
          DEPLOY_STAGING=false

          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "mvp-polish" ]; }; then
            PUBLISH_IMAGES=true
            DEPLOY_STAGING=true
            RUN_PERFORMANCE=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN_DOCKER="${{ github.event.inputs.run_docker }}"
            RUN_E2E="${{ github.event.inputs.run_e2e }}"
            RUN_PERFORMANCE="${{ github.event.inputs.run_performance }}"
            PUBLISH_IMAGES="${{ github.event.inputs.publish_images }}"
            DEPLOY_STAGING="${{ github.event.inputs.deploy_staging }}"

            if [ "$DEPLOY_STAGING" = "true" ]; then
              RUN_DOCKER=true
              RUN_E2E=true
              PUBLISH_IMAGES=true
            fi
          fi

          echo "run_docker=$RUN_DOCKER" >> "$GITHUB_OUTPUT"
          echo "run_e2e=$RUN_E2E" >> "$GITHUB_OUTPUT"
          echo "run_performance=$RUN_PERFORMANCE" >> "$GITHUB_OUTPUT"
          echo "publish_images=$PUBLISH_IMAGES" >> "$GITHUB_OUTPUT"
          echo "deploy_staging=$DEPLOY_STAGING" >> "$GITHUB_OUTPUT"

          if [ "$PUBLISH_IMAGES" = "true" ]; then
            echo "e2e_image_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "e2e_image_tag=${{ github.base_ref || 'main' }}" >> "$GITHUB_OUTPUT"
          else
            echo "e2e_image_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
          echo "image_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload Docker plans
        uses: actions/upload-artifact@v6
        with:
          name: docker-plans
          path: tmp/docker-workflow/*.json
          retention-days: 7

  validate:
    name: Validate
    runs-on: ubuntu-24.04
    needs: [plan]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive SHAs for nx affected
        if: github.event_name != 'workflow_dispatch'
        uses: nrwl/nx-set-shas@v4

      - name: Check formatting
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pnpm exec nx format:check
          else
            pnpm exec nx format:check --base="${{ env.NX_BASE }}" --head="${{ env.NX_HEAD }}"
          fi

      - name: Validate nx workspace
        run: pnpm exec nx show projects

      - name: Client UI heuristics
        run: pnpm run ui:heuristics:ci

      - name: Run Go deployment inventory tests
        working-directory: tools/admin-env-wizard
        run: |
          GOCACHE=/tmp/go-build go test ./internal/catalog/...
          GOCACHE=/tmp/go-build go test ./internal/generate/...

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Validate workflow and k8s inventory
        continue-on-error: true
        run: DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json node scripts/validate-deployment-inventory.mjs

      - name: Validate compose and k8s parity
        continue-on-error: true
        run: bash scripts/validate-compose-k8s-parity.sh

  quality:
    name: Quality - ${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: [plan, validate]
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        target: [lint, test]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive SHAs for nx affected
        if: github.event_name != 'workflow_dispatch'
        uses: nrwl/nx-set-shas@v4

      - name: Run affected ${{ matrix.target }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ matrix.target }}" = "test" ]; then
            pnpm exec nx run-many -t test -c ci --parallel=3 --outputStyle=static
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pnpm exec nx run-many -t ${{ matrix.target }} --parallel=3 --outputStyle=static
          elif [ "${{ matrix.target }}" = "test" ]; then
            pnpm exec nx affected -t test -c ci --base="${{ env.NX_BASE }}" --head="${{ env.NX_HEAD }}" --parallel=3 --outputStyle=static
          elif [ "${{ matrix.target }}" = "lint" ]; then
            pnpm exec nx affected -t lint --base="${{ env.NX_BASE }}" --head="${{ env.NX_HEAD }}" --parallel=3 --outputStyle=static --exclude='*-e2e'
          else
            pnpm exec nx affected -t build --base="${{ env.NX_BASE }}" --head="${{ env.NX_HEAD }}" --parallel=3 --outputStyle=static
          fi
        env:
          CI: true

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: quality-${{ matrix.target }}
          path: |
            coverage/
            dist/
            test-results/
          retention-days: 7

  image_check:
    name: Image Check - ${{ matrix.app }}
    runs-on: ubuntu-24.04
    needs: [plan, quality]
    if: needs.plan.outputs.run_docker == 'true' && needs.plan.outputs.changed_has_changes == 'true'
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.plan.outputs.changed_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build image check
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}:${{ needs.plan.outputs.image_tag }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  publish_images:
    name: Publish Images - ${{ matrix.app }}
    runs-on: ubuntu-24.04
    needs: [plan, image_check]
    if: needs.plan.outputs.run_docker == 'true' && needs.plan.outputs.publish_images == 'true' && needs.image_check.result == 'success'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.plan.outputs.full_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve publish tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}:${{ needs.plan.outputs.image_tag }},${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}:${{ github.ref_name }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="$TAGS,${{ env.IMAGE_NAME }}/optimistic_tanuki_${{ matrix.app }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  microservices_e2e:
    name: Microservices E2E
    runs-on: ubuntu-24.04
    needs: [plan, quality, image_check, publish_images]
    if: needs.plan.outputs.run_e2e == 'true' && needs.quality.result == 'success' && (needs.image_check.result == 'success' || needs.image_check.result == 'skipped') && (needs.publish_images.result == 'success' || needs.publish_images.result == 'skipped')
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to Docker Hub
        if: needs.plan.outputs.publish_images == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull shared stack images
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml pull \
            authentication profile social assets \
            project-planning chat-collector telos-docs-service prompt-proxy \
            ai-orchestrator blogging permissions store app-configurator \
            app-configurator-seed lead-tracker gateway
        env:
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Start shared infrastructure stack
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml up -d --no-build \
            db redis db-setup \
            authentication profile social assets \
            project-planning chat-collector telos-docs-service prompt-proxy \
            ai-orchestrator blogging permissions store app-configurator \
            app-configurator-seed lead-tracker gateway
          sleep 60
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Run microservices e2e suites
        run: |
          pnpm exec nx e2e authentication-e2e --configuration=ci
          pnpm exec nx e2e profile-e2e --configuration=ci
          pnpm exec nx e2e social-e2e --configuration=ci
          pnpm exec nx e2e assets-e2e --configuration=ci
          pnpm exec nx e2e blogging-e2e --configuration=ci
          pnpm exec nx e2e gateway-e2e --configuration=ci
          pnpm exec nx e2e permissions-e2e --configuration=ci
          pnpm exec nx e2e project-planning-e2e --configuration=ci
          pnpm exec nx e2e chat-collector-e2e --configuration=ci
          pnpm exec nx e2e prompt-proxy-e2e --configuration=ci
          pnpm exec nx e2e telos-docs-service-e2e --configuration=ci
          pnpm exec nx e2e ai-orchestrator-e2e --configuration=ci
          pnpm exec nx e2e app-configurator-e2e --configuration=ci
        env:
          CI: true

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          docker compose -f e2e/docker-compose.e2e-stack.yaml logs > docker-logs/microservices-stack.log
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps > docker-logs/microservices-status.txt

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: docker-logs-microservices
          path: docker-logs/
          retention-days: 7

      - name: Stop shared infrastructure stack
        if: always()
        run: docker compose -f e2e/docker-compose.e2e-stack.yaml down -v

      - name: Cleanup local Docker layers
        if: always()
        run: ./scripts/docker-image-cleanup.sh --keep-tag "${{ needs.plan.outputs.e2e_image_tag }}"

  ui_e2e:
    name: UI E2E
    runs-on: ubuntu-24.04
    needs: [plan, quality, image_check, publish_images]
    if: needs.plan.outputs.run_e2e == 'true' && needs.quality.result == 'success' && (needs.image_check.result == 'success' || needs.image_check.result == 'skipped') && (needs.publish_images.result == 'success' || needs.publish_images.result == 'skipped')
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to Docker Hub
        if: needs.plan.outputs.publish_images == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Pull shared stack images
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml pull \
            authentication profile social assets \
            project-planning chat-collector telos-docs-service prompt-proxy \
            blogging permissions store app-configurator app-configurator-seed \
            lead-tracker gateway \
            client-interface forgeofwill digital-homestead \
            christopherrutherford-net owner-console store-client configurable-client
        env:
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Start shared backend infrastructure
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml up -d --no-build \
            db redis db-setup \
            authentication profile social assets \
            project-planning chat-collector telos-docs-service prompt-proxy \
            blogging permissions store app-configurator \
            app-configurator-seed lead-tracker gateway
          sleep 60
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Start client-interface app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile client-interface up -d --no-build client-interface
          sleep 20
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Run client-interface-e2e
        run: pnpm exec nx e2e client-interface-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8080

      - name: Stop client-interface app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile client-interface stop client-interface
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile client-interface rm -f client-interface

      - name: Start forgeofwill app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile forgeofwill up -d --no-build forgeofwill
          sleep 20
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Run forgeofwill-e2e
        run: pnpm exec nx e2e forgeofwill-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8081

      - name: Stop forgeofwill app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile forgeofwill stop forgeofwill
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile forgeofwill rm -f forgeofwill

      - name: Start digital-homestead app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile digital-homestead up -d --no-build digital-homestead
          sleep 20
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Run digital-homestead-e2e
        run: pnpm exec nx e2e digital-homestead-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8082

      - name: Stop digital-homestead app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile digital-homestead stop digital-homestead
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile digital-homestead rm -f digital-homestead

      - name: Start christopherrutherford-net app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile christopherrutherford-net up -d --no-build christopherrutherford-net
          sleep 20
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Run christopherrutherford-net-e2e
        run: pnpm exec nx e2e christopherrutherford-net-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8083

      - name: Stop christopherrutherford-net app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile christopherrutherford-net stop christopherrutherford-net
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile christopherrutherford-net rm -f christopherrutherford-net

      - name: Start owner-console app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile owner-console up -d --no-build owner-console
          sleep 20
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Run owner-console-e2e
        run: pnpm exec nx e2e owner-console-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8084

      - name: Stop owner-console app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile owner-console stop owner-console
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile owner-console rm -f owner-console

      - name: Start store-client app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile store-client up -d --no-build store-client
          sleep 20
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Run store-client-e2e
        run: pnpm exec nx e2e store-client-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8085

      - name: Stop store-client app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile store-client stop store-client
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile store-client rm -f store-client

      - name: Start configurable-client app
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile configurable-client up -d --no-build configurable-client
          sleep 20
        env:
          CI: true
          E2E_IMAGE_TAG: ${{ needs.plan.outputs.e2e_image_tag }}

      - name: Run configurable-client-e2e
        run: pnpm exec nx e2e configurable-client-e2e --configuration=ci
        env:
          CI: true
          BASE_URL: http://localhost:8090

      - name: Stop configurable-client app
        if: always()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile configurable-client stop configurable-client
          docker compose -f e2e/docker-compose.e2e-stack.yaml --profile configurable-client rm -f configurable-client

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          docker compose -f e2e/docker-compose.e2e-stack.yaml logs > docker-logs/ui-stack.log
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps > docker-logs/ui-status.txt

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: docker-logs-ui
          path: docker-logs/
          retention-days: 7

      - name: Stop shared backend infrastructure
        if: always()
        run: docker compose -f e2e/docker-compose.e2e-stack.yaml down -v

      - name: Cleanup local Docker layers
        if: always()
        run: ./scripts/docker-image-cleanup.sh --keep-tag "${{ needs.plan.outputs.e2e_image_tag }}"

  lighthouse_performance:
    name: Lighthouse Performance - ${{ matrix.app }}
    runs-on: ubuntu-24.04
    needs: [plan, microservices_e2e, ui_e2e]
    if: needs.plan.outputs.run_performance == 'true' && needs.microservices_e2e.result == 'success' && needs.ui_e2e.result == 'success'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app:
          - digital-homestead
          - owner-console
          - forgeofwill
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm exec nx build ${{ matrix.app }} --configuration=production
        env:
          CI: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start application
        run: |
          docker build \
            -f apps/${{ matrix.app }}/Dockerfile \
            -t ot-${{ matrix.app }}:ci \
            .
          docker run -d --name app-${{ matrix.app }} \
            -p 4200:4000 \
            -e NODE_ENV=production \
            ot-${{ matrix.app }}:ci

          echo "Waiting for app to be available on port 4200..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4200 > /dev/null 2>&1; then
              echo "App is ready."
              break
            fi
            echo "Attempt $i/30 - not ready yet, waiting 3s..."
            sleep 3
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:4200
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop application
        if: always()
        run: docker rm -f app-${{ matrix.app }} 2>/dev/null || true

  load_performance:
    name: Load Performance
    runs-on: ubuntu-24.04
    needs: [plan, microservices_e2e, ui_e2e]
    if: needs.plan.outputs.run_performance == 'true' && needs.microservices_e2e.result == 'success' && needs.ui_e2e.result == 'success'
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build services
        run: pnpm exec nx run-many -t build --configuration=production --parallel=3
        env:
          CI: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build db-setup
        run: docker compose -f e2e/docker-compose.e2e-stack.yaml build db-setup

      - name: Start full stack
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml up -d db-setup
          docker compose -f e2e/docker-compose.e2e-stack.yaml up -d
          echo "Waiting for services..."
          sleep 60

      - name: Dump stack logs on failure
        if: failure()
        run: |
          docker compose -f e2e/docker-compose.e2e-stack.yaml ps
          docker compose -f e2e/docker-compose.e2e-stack.yaml logs db-setup gateway || true

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Create load test script
        run: |
          cat > load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';

          export const options = {
            stages: [
              { duration: '30s', target: 10 },
              { duration: '1m', target: 10 },
              { duration: '30s', target: 50 },
              { duration: '1m', target: 50 },
              { duration: '30s', target: 0 },
            ],
            thresholds: {
              http_req_duration: ['p(95)<500'],
              http_req_failed: ['rate<0.05'],
            },
          };

          export default function () {
            const res = http.get('http://localhost:3000/api-docs');
            check(res, {
              'status is 200': (r) => r.status === 200,
              'response time < 500ms': (r) => r.timings.duration < 500,
            });
            sleep(1);
          }
          EOF

      - name: Run load test
        run: k6 run load-test.js --out json=load-test-results.json

      - name: Stop services
        if: always()
        run: docker compose -f e2e/docker-compose.e2e-stack.yaml down

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: load-test-results
          path: load-test-results.json
          retention-days: 30

      - name: Generate load test summary
        if: always()
        run: |
          echo "## Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "load-test-results.json" ]; then
            echo "Load test completed. See artifacts for detailed results." >> $GITHUB_STEP_SUMMARY
          else
            echo "Load test results not found." >> $GITHUB_STEP_SUMMARY
          fi

  update_staging_overlay:
    name: Update Staging Overlay
    runs-on: ubuntu-24.04
    needs:
      [
        plan,
        microservices_e2e,
        ui_e2e,
        lighthouse_performance,
        load_performance,
      ]
    if: needs.plan.outputs.deploy_staging == 'true' && needs.microservices_e2e.result == 'success' && needs.ui_e2e.result == 'success' && (needs.lighthouse_performance.result == 'success' || needs.lighthouse_performance.result == 'skipped') && (needs.load_performance.result == 'success' || needs.load_performance.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Git config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Update staging overlay images with SHA tag
        run: |
          DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json \
          node scripts/update-k8s-overlay-images.mjs k8s/overlays/staging/kustomization.yaml "${{ needs.plan.outputs.image_tag }}"

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update staging image tags to ${{ needs.plan.outputs.image_tag }}"
            git push origin ${{ github.ref_name }}
          fi

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-24.04
    environment: staging
    needs: [plan, update_staging_overlay]
    if: needs.plan.outputs.deploy_staging == 'true' && needs.update_staging_overlay.result == 'success' && secrets.KUBECONFIG != '' && secrets.DOMAIN != '' && secrets.ARGOCD_PASSWORD != ''
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: argocd login argocd.${{ secrets.DOMAIN }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

      - name: Resolve staging deployment workspace context
        run: |
          DEPLOYMENT_NAME=staging ARGO_ENV=staging node scripts/lib/deployment-workspace-context.mjs > /tmp/staging-workspace-context.json
          echo "ARGOCD_APP_FILE=$(node -e "const fs=require('fs'); const context=JSON.parse(fs.readFileSync('/tmp/staging-workspace-context.json','utf8')); process.stdout.write(context.argocdAppFile)")" >> "$GITHUB_ENV"
          echo "ARGOCD_APP_NAME=$(node -e "const fs=require('fs'); const context=JSON.parse(fs.readFileSync('/tmp/staging-workspace-context.json','utf8')); process.stdout.write(context.appName)")" >> "$GITHUB_ENV"

      - name: Apply ArgoCD Application for staging
        run: |
          if grep -q 'dist/admin-env/staging/k8s' "$ARGOCD_APP_FILE"; then
            kubectl apply -f "$ARGOCD_APP_FILE"
          else
            sed \
              -e "s|\${ARGO_APP_NAME:-optimistic-tanuki}|optimistic-tanuki-staging|g" \
              -e "s|\${ARGO_NAMESPACE:-optimistic-tanuki}|optimistic-tanuki-staging|g" \
              -e "s|\${ARGO_REPO_URL:-https://github.com/cjrutherford/optimistic-tanuki.git}|https://github.com/cjrutherford/optimistic-tanuki.git|g" \
              -e "s|\${ARGO_TARGET_REVISION:-main}|${GITHUB_REF_NAME}|g" \
              -e "s|\${ARGO_ENV:-production}|staging|g" \
              "$ARGOCD_APP_FILE" | kubectl apply -f -
          fi

      - name: Sync staging application
        run: argocd app sync "$ARGOCD_APP_NAME" --server argocd.${{ secrets.DOMAIN }} --insecure --timeout 600

      - name: Wait for staging deployment
        run: argocd app wait "$ARGOCD_APP_NAME" --server argocd.${{ secrets.DOMAIN }} --insecure --timeout 600

      - name: Run staging smoke test
        run: |
          sleep 30
          curl -f "https://staging.${{ secrets.DOMAIN }}/api/mcp/sse"

  summary:
    name: Summary
    runs-on: ubuntu-24.04
    needs:
      - plan
      - validate
      - quality
      - image_check
      - publish_images
      - microservices_e2e
      - ui_e2e
      - lighthouse_performance
      - load_performance
      - update_staging_overlay
      - deploy_staging
    if: always()
    steps:
      - name: Summarize pipeline
        run: |
          echo "## CI/CD Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Validate: ${{ needs.validate.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Quality: ${{ needs.quality.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image check: ${{ needs.image_check.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Publish images: ${{ needs.publish_images.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Microservices e2e: ${{ needs.microservices_e2e.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- UI e2e: ${{ needs.ui_e2e.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lighthouse performance: ${{ needs.lighthouse_performance.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Load performance: ${{ needs.load_performance.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Update staging overlay: ${{ needs.update_staging_overlay.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy staging: ${{ needs.deploy_staging.result }}" >> "$GITHUB_STEP_SUMMARY"

          for status in \
            "${{ needs.validate.result }}" \
            "${{ needs.quality.result }}" \
            "${{ needs.image_check.result }}" \
            "${{ needs.publish_images.result }}" \
            "${{ needs.microservices_e2e.result }}" \
            "${{ needs.ui_e2e.result }}" \
            "${{ needs.lighthouse_performance.result }}" \
            "${{ needs.load_performance.result }}"; do
            if [ "$status" = "failure" ]; then
              exit 1
            fi
          done
