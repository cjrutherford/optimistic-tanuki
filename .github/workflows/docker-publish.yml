name: Docker Build and Push

on:
  push:
    branches:
      - '**' # Triggers on pushes to all branches

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  determine_changes:
    name: Determine Changed Images
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      unchanged_apps: ${{ steps.matrix.outputs.unchanged_apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Restore Docker plan cache
        id: restore-plan
        uses: actions/cache/restore@v4
        with:
          path: tmp/docker-workflow/services.plan.json
          key: docker-plan-${{ github.sha }}-docker-publish
          restore-keys: |
            docker-plan-${{ github.sha }}-

      - name: Install dependencies
        if: steps.restore-plan.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Derive SHAs for docker planning
        if: steps.restore-plan.outputs.cache-hit != 'true' && github.event_name != 'workflow_dispatch'
        uses: nrwl/nx-set-shas@v4

      - name: Generate Docker change plan fallback
        if: steps.restore-plan.outputs.cache-hit != 'true'
        run: |
          mkdir -p tmp/docker-workflow
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/docker-plan-services.mjs \
              --workspace-root "$PWD" \
              --compose-file docker-compose.yaml \
              --write-plan tmp/docker-workflow/services.plan.json \
              --force-all
          else
            node scripts/docker-plan-services.mjs \
              --workspace-root "$PWD" \
              --compose-file docker-compose.yaml \
              --write-plan tmp/docker-workflow/services.plan.json \
              --base-ref "${{ env.NX_BASE }}" \
              --head-ref "${{ env.NX_HEAD }}"
          fi

      - name: Resolve changed app matrix
        id: matrix
        run: |
          node scripts/resolve-docker-changes.mjs \
            --plan-file tmp/docker-workflow/services.plan.json \
            --compose-file docker-compose.yaml

      - name: Save Docker plan cache
        if: steps.restore-plan.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tmp/docker-workflow/services.plan.json
          key: docker-plan-${{ github.sha }}-docker-publish

  build_and_push:
    name: Build and Push ${{ matrix.app }}
    runs-on: ubuntu-24.04
    needs: [determine_changes]
    if: needs.determine_changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.determine_changes.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: cjrutherford/optimistic_tanuki_${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
  retag-unchanged:
    name: Retag unchanged apps on main
    runs-on: ubuntu-24.04
    needs: [determine-changes]
    if: ${{ needs.determine-changes.outputs.has_changes == 'true' && github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.determine-changes.outputs.unchanged_apps) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get previous successful workflow run
        id: prev-run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-publish.yml',
              branch: 'main',
              status: 'success',
              per_page: 2
            });
            const currentSha = context.sha;
            const prev = runs.find(r => r.head_sha !== currentSha);
            if (prev) {
              core.setOutput('sha', prev.head_sha);
            } else {
              core.setOutput('sha', '');
            }

      - name: Retag ${{ matrix.app }} to current SHA
        if: steps.prev-run.outputs.sha != ''
        run: |
          docker pull cjrutherford/optimistic_tanuki_${{ matrix.app }}:sha-${{ steps.prev-run.outputs.sha }}
          docker tag cjrutherford/optimistic_tanuki_${{ matrix.app }}:sha-${{ steps.prev-run.outputs.sha }} \
                 cjrutherford/optimistic_tanuki_${{ matrix.app }}:sha-${{ github.sha }}
          docker push cjrutherford/optimistic_tanuki_${{ matrix.app }}:sha-${{ github.sha }}
