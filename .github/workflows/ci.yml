name: CI - Main Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop
      - MVP-polish

permissions:
  actions: read
  contents: read
  checks: write

jobs:
  # Quick validation job - runs first
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Check formatting
        run: npx nx format:check --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}

      - name: Validate nx workspace
        run: npx nx workspace-lint

  # Main CI job with affected commands
  affected:
    name: Affected Build & Test
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 30

    strategy:
      matrix:
        target: [lint, test, build]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright (for E2E)
        if: matrix.target == 'e2e'
        run: npx playwright install --with-deps

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Run affected ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "test" ]; then
            npx nx affected -t ${{ matrix.target }} --configuration=ci --parallel=3 --maxParallel=3
          elif [ "${{ matrix.target }}" = "lint" ]; then
            npx nx affected -t ${{ matrix.target }} --parallel=3 --maxParallel=3 --exclude='*-e2e'
          else
            npx nx affected -t ${{ matrix.target }} --parallel=3 --maxParallel=3
          fi
        env:
          CI: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-results
          path: |
            coverage/
            dist/
            test-results/
          retention-days: 7

  # Summary job
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate, affected]
    if: always()

    steps:
      - name: Check CI status
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "✅ Validation: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Validation: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.affected.result }}" = "success" ]; then
            echo "✅ Affected Build & Test: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Affected Build & Test: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if any job failed
          if [ "${{ needs.validate.result }}" != "success" ] || [ "${{ needs.affected.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ CI Pipeline Failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All CI checks passed!" >> $GITHUB_STEP_SUMMARY
          fi
