name: CI - Main Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop
      - mvp-polish

permissions:
  actions: read
  contents: read
  checks: write

jobs:
  # Quick validation job - runs first
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Check formatting
        run: pnpm exec nx format:check --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}

      - name: Validate nx workspace
        run: pnpm exec nx show projects

  # Main CI job with affected commands
  affected:
    name: Affected Build & Test
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 30

    strategy:
      matrix:
        target: [lint, test, build]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (for E2E)
        if: matrix.target == 'e2e'
        run: npx playwright install --with-deps

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Run affected ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "test" ]; then
            pnpm exec nx affected -t ${{ matrix.target }} -c ci --base="${{ env.NX_BASE }}" --head="${{ env.NX_HEAD }}" --parallel=3 --outputStyle=static
          elif [ "${{ matrix.target }}" = "lint" ]; then
            pnpm exec nx affected -t ${{ matrix.target }} --base="${{ env.NX_BASE }}" --head="${{ env.NX_HEAD }}" --parallel=3 --outputStyle=static --exclude='*-e2e'
          else
            pnpm exec nx affected -t ${{ matrix.target }} --base="${{ env.NX_BASE }}" --head="${{ env.NX_HEAD }}" --parallel=3 --outputStyle=static
          fi
        env:
          CI: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-results
          path: |
            coverage/
            dist/
            test-results/
          retention-days: 7

  deployment-contract:
    name: Deployment Contract
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/admin-env-wizard/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Go deployment inventory tests
        working-directory: tools/admin-env-wizard
        run: |
          GOCACHE=/tmp/go-build go test ./internal/catalog/...
          GOCACHE=/tmp/go-build go test ./internal/generate/...

      - name: Export deployment inventory
        working-directory: tools/admin-env-wizard
        run: GOCACHE=/tmp/go-build go run ./cmd/deployment-inventory > /tmp/deployment-inventory.json

      - name: Validate workflow and k8s inventory
        run: DEPLOYMENT_INVENTORY_FILE=/tmp/deployment-inventory.json node scripts/validate-deployment-inventory.mjs

      - name: Validate compose and k8s parity
        run: bash scripts/validate-compose-k8s-parity.sh

  # Summary job
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate, affected, deployment-contract]
    if: always()

    steps:
      - name: Check CI status
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "✅ Validation: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Validation: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.affected.result }}" = "success" ]; then
            echo "✅ Affected Build & Test: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Affected Build & Test: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deployment-contract.result }}" = "success" ]; then
            echo "✅ Deployment Contract: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment Contract: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if any job failed
          if [ "${{ needs.validate.result }}" != "success" ] || [ "${{ needs.affected.result }}" != "success" ] || [ "${{ needs.deployment-contract.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ CI Pipeline Failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All CI checks passed!" >> $GITHUB_STEP_SUMMARY
          fi
