services:
  postgres:
    image: postgres:17
    restart: always
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: local_hub_e2e_redis
    ports:
      - '6380:6379'
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: node:lts-alpine
    container_name: local_hub_e2e_db_setup
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      ADDITIONAL_DBS: ot_authentication,ot_profile,ot_social,ot_assets,ot_classifieds,ot_payments
    depends_on:
      postgres:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && npm run db:setup"
    restart: 'no'
    profiles:
      - setup

  authentication:
    build:
      context: .
      dockerfile: ./apps/authentication/Dockerfile
    container_name: local_hub_e2e_authentication
    ports:
      - '3001:3001'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ot_local_hub
      - JWT_SECRET=e2e-test-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  profile:
    build:
      context: .
      dockerfile: ./apps/profile/Dockerfile
    container_name: local_hub_e2e_profile
    ports:
      - '3002:3002'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ot_local_hub
    depends_on:
      postgres:
        condition: service_healthy
      authentication:
        condition: service_started

  social:
    build:
      context: .
      dockerfile: ./apps/social/Dockerfile
    container_name: local_hub_e2e_social
    ports:
      - '3003:3003'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ot_local_hub
    depends_on:
      postgres:
        condition: service_healthy

  assets:
    build:
      context: .
      dockerfile: ./apps/assets/Dockerfile
    container_name: local_hub_e2e_assets
    ports:
      - '3005:3005'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ot_local_hub
      - STORAGE_STRATEGY=local
      - LOCAL_STORAGE_PATH=/usr/src/app/storage
    volumes:
      - ./e2e/test-assets:/usr/src/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  classifieds:
    build:
      context: .
      dockerfile: ./apps/classifieds/Dockerfile
    container_name: local_hub_e2e_classifieds
    ports:
      - '3017:3017'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ot_local_hub
    depends_on:
      postgres:
        condition: service_healthy

  payments:
    build:
      context: .
      dockerfile: ./apps/payments/Dockerfile
    container_name: local_hub_e2e_payments
    ports:
      - '3018:3018'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ot_local_hub
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
    container_name: local_hub_e2e_gateway
    ports:
      - '3000:3000'
      - '3300:3300'
      - '3301:3301'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ot_local_hub
      - AUTH_SERVICE_URL=http://authentication:3001
      - PROFILE_SERVICE_URL=http://profile:3002
      - SOCIAL_SERVICE_URL=http://social:3003
      - ASSETS_SERVICE_URL=http://assets:3005
      - CLASSIFIEDS_SERVICE_URL=http://classifieds:3017
      - PAYMENTS_SERVICE_URL=http://payments:3018
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "require('http').get('http://localhost:3000/api/mcp/sse', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', (err) => process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 15
    depends_on:
      postgres:
        condition: service_healthy
      authentication:
        condition: service_started
      profile:
        condition: service_started
      social:
        condition: service_started
      assets:
        condition: service_started
      classifieds:
        condition: service_started
      payments:
        condition: service_started

  local-hub-frontend:
    build:
      context: .
      dockerfile: ./apps/local-hub/Dockerfile
    container_name: local_hub_e2e_frontend
    ports:
      - '8087:4000'
    environment:
      - GATEWAY_URL=http://gateway:3000
      - GATEWAY_WS_URL=http://gateway:3300
      - NODE_ENV=development
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:4000']
      interval: 10s
      timeout: 5s
      retries: 5

  e2e-test-runner:
    image: mcr.microsoft.com/playwright:v1.42.1
    container_name: local_hub_e2e_runner
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - CI=true
      - BASE_URL=http://local-hub-frontend:4000
      - GATEWAY_URL=http://gateway:3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ot_local_hub
    depends_on:
      local-hub-frontend:
        condition: service_healthy
    command: /bin/sh -c "npx playwright install --with-deps chromium && npx playwright test"
    profiles:
      - test
