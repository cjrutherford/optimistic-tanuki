# Tanuki reverse proxy config for public production apps outside the default site file.

include /config/nginx/tanuki-upstream-host.inc;

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name hopefulaspirationsindustries.com;

    set $upstream_app $tanuki_upstream_host;
    set $upstream_port 8088;
    set $upstream_proto $tanuki_upstream_proto;

    include /config/nginx/tanuki-app-server.inc;
}

