<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Signal Foundry</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Signal Foundry generates campaign strategy, channel drafts, and material-ready marketing outputs for products, apps, and web development services."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      The literal placeholder below is substituted server-side, per request,
      for a cryptographically random nonce (see apps/business-site/src/server.ts
      and apps/business-site/src/csp-nonce.ts). Angular's `CSP_NONCE` token
      also reads this attribute by default, so both the build's critical-CSS
      inliner and, after hydration, the browser's own style renderer discover
      the same nonce automatically. Do not give this a real value here: it
      must never be a static, build-time constant.
    -->
    <app-root ngCspNonce="__CSP_NONCE_PLACEHOLDER__"></app-root>
  </body>
</html>
