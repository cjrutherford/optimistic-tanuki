<section class="hero-shell">
  <div class="hero-stage">
    <span class="hero-kicker"
      >Portfolio, product, and platform engineering</span
    >
    <lib-hero
      [title]="'Christopher Rutherford'"
      [subtitle]="
        'I help teams build software that works well for customers and still makes sense to the people maintaining it.'
      "
      [description]="
        'If a product needs clearer structure, steadier delivery, or hands-on engineering help, I step in and help get the work moving in a way the team can live with.'
      "
      [buttonText]="'Start a project'"
      [imageUrl]="'assets/images/starfield.jpg'"

  <div class="hero-actions">

  <div class="hero-proof-strip">
