<otui-tile class="section-heading-tile">
  <span class="section-kicker">What I offer</span>
  <otui-heading
    [text]="
      'I help teams sort out product, platform, and delivery work that needs a clearer path'
    "
    [size]="'2em'"
  ></otui-heading>
  <p class="section-intro">
    Sometimes that means building something new. Sometimes it means untangling
    work that has drifted, stalled, or grown harder to maintain than it should
    be.
  </p>
</otui-tile>
<div class="projectGrid">
  @for (service of services; track service.title) {
  <lib-blog-post-card
    [title]="service.title"
    [bannerImage]="service.image"
    [excerpt]="service.excerpt"
    [readMoreLink]="service.primaryHref"
    [readMoreText]="service.primaryText"
    [secondaryButtonText]="service.secondaryText"
    (secondaryButtonAction)="linkTo(service.secondaryHref)"
    [authorName]="''"
    [publishDate]="''"
  >
  </lib-blog-post-card>
  }
</div>
