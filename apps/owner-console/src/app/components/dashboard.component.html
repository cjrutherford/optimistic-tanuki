<div class="dashboard-container">
  <otui-app-bar
    appTitle="Owner Console"
    [showThemeToggle]="true"
    [useTile]="false"
    (menuToggle)="toggleSidebar()"
    logoSrc="/tempest-in-a-teacup.png"
    logoAlt="Owner Console Logo"
  >
    <button
      class="theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="themeToggleLabel"
    >
      <span class="theme-toggle__icon" aria-hidden="true">
        {{ (theme$ | async) === 'dark' ? 'Light' : 'Dark' }}
      </span>
      <span class="theme-toggle__label">{{ themeToggleLabel }}</span>
    </button>
  </otui-app-bar>

  <otui-nav-sidebar
    [isOpen]="sidebarOpen"
    [navItems]="navItems"
    heading="Operator Workspaces"
    (close)="closeSidebar()"
  ></otui-nav-sidebar>

  <div class="content" [class.sidebar-open]="sidebarOpen">
    <router-outlet></router-outlet>
  </div>
</div>
