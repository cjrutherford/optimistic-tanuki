<div
  class="container"
  [ngStyle]="{ background: backgroundGradient, color: foreground }"
>
  <otui-app-bar
    appTitle="Video Platform"
    logoSrc="assets/logo.png"
    logoAlt="Video Platform Logo"
    [showThemeToggle]="true"
    [useTile]="false"
    (menuToggle)="toggleNav()"
  >
  </otui-app-bar>

  <otui-nav-sidebar
    [isOpen]="isNavExpanded()"
    [navItems]="navItems()"
    heading="Navigation"
    (close)="isNavExpanded.set(false)"
  >
  </otui-nav-sidebar>

  <div class="content">
    <router-outlet />
  </div>
</div>
