<otui-tile>
  <div class="icon">
    <otui-icon name="person"></otui-icon>
  </div>
  <div class="img">
    <img
      class="avatar"
      [src]="friend.photo || 'https://placehold.it/300x300'"
      alt="{{ friend.name }}"
      width="500px"
    />
  </div>

  <div class="name">{{ friend.name }}</div>
</otui-tile>
