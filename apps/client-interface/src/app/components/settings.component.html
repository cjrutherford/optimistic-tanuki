<div class="settings-container">
  <div class="settings-header">
    <h1>{{ title }}</h1>
    <p>Personalize your experience with custom themes and profile settings</p>
  </div>

  <div class="settings-content">
    <!-- Profile Section -->
    <section class="settings-section">
      <h2>Profile</h2>
      <div
        class="profile-card"
        (click)="openProfileEditor()"
        (keyup.enter)="openProfileEditor()"
        tabindex="0"
        role="button"
        aria-label="Edit profile"
      >
        <lib-banner
          [profileName]="profileName"
          [profileImage]="profileImage"
          [backgroundImage]="backgroundImage"
        ></lib-banner>
        <div class="profile-overlay">
          <span class="profile-hint">Click to edit profile</span>
        </div>
      </div>
    </section>

    <!-- Theme Section -->
    <section class="settings-section">
      <h2>Theme & Appearance</h2>
      <div class="theme-controls">
        <otui-button
          [variant]="showThemeDesigner ? 'primary' : 'outlined'"
          (click)="toggleThemeDesigner()"
        >
          {{ showThemeDesigner ? 'Hide' : 'Customize' }} Theme
        </otui-button>
      </div>

      <div *ngIf="showThemeDesigner" class="theme-designer-wrapper">
        <lib-theme-designer></lib-theme-designer>
      </div>
    </section>
  </div>

  <lib-profile-editor
    [open]="showProfileEditor"
    [profile]="profile()"
    (createProfile)="onCreateProfile($event)"
    [defaultName]="profileName"
    (updateProfile)="onUpdateProfile($event)"
    (closeEditor)="onProfileEditorClose()"
  >
  </lib-profile-editor>
</div>
