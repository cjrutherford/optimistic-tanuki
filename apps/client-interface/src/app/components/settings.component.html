<div class="settings-container">
  <lib-settings-shell
    [title]="title"
    [description]="description"
    [profileName]="profileName"
    [profileImage]="profileImage"
    [backgroundImage]="backgroundImage"
    [profile]="profile()"
    [defaultName]="profileName"
    [hasThemeSection]="true"
    profileHint="Edit profile"
    (createProfile)="onCreateProfile($event)"
    (updateProfile)="onUpdateProfile($event)"
  >
    <section class="settings-section" settings-theme>
      <h2>Theme & Appearance</h2>
      <p class="section-description">
        Adjust how the network feels before visitors reach your feed, profile,
        or community spaces.
      </p>
      <div class="theme-controls">
        <otui-button
          [variant]="showThemeDesigner ? 'primary' : 'outlined'"
          (click)="toggleThemeDesigner()"
        >
          {{ showThemeDesigner ? 'Hide' : 'Customize' }} Theme
        </otui-button>
      </div>

      <div *ngIf="showThemeDesigner" class="theme-designer-wrapper">
        <lib-theme-designer></lib-theme-designer>
      </div>
    </section>
  </lib-settings-shell>
</div>
