<div class="feed-container">
  <div class="feed-tabs">
    <otui-button
      [variant]="currentFeed === 'public' ? 'primary' : 'outlined'"
      (action)="loadPublicFeed()"
    >
      Public Feed
    </otui-button>
    <otui-button
      [variant]="currentFeed === 'following' ? 'primary' : 'outlined'"
      (action)="loadFollowingFeed()"
    >
      Following Feed
    </otui-button>
  </div>

  @if (posts().length === 0) {
  <div class="feed-loading">
    <otui-spinner></otui-spinner>
    <p>Loading posts...</p>
  </div>
  }

  <div class="compose-wrapper">
    <lib-social-compose
      (postSubmitted)="createdPost($event)"
      [imageUploadCallback]="imageUploadCallback"
    >
    </lib-social-compose>
  </div>

  <div class="posts-list">
    @for (post of posts(); track post.id; let i = $index) {
    <lib-post
      [profile]="profiles()[post.profileId]"
      [availableProfiles]="profiles()"
      [content]="post"
      [comments]="post.comments || []"
      [canDelete]="canDeletePost(post)"
      (postDeleted)="onDeletePost(post)"
      [canFollow]="canFollow(post)"
      [isFollowing]="isFollowing(post)"
      (followToggle)="onFollowToggle(post)"
      (newCommentAdded)="commented($event, i)"
      [imageUploadCallback]="imageUploadCallback"
    ></lib-post>
    }
  </div>
</div>
