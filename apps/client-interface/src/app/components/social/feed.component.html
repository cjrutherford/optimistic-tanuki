<div class="feed-tabs">
  <button (click)="loadPublicFeed()" [class.active]="currentFeed === 'public'">
    Public Feed
  </button>
  <button
    (click)="loadFollowingFeed()"
    [class.active]="currentFeed === 'following'"
  >
    Following Feed
  </button>
</div>
<div class="feed-container">
  <lib-social-compose
    (postSubmitted)="createdPost($event)"
    [imageUploadCallback]="imageUploadCallback"
    style="width: 100%; padding-left: 1em; margin-right: 1em"
  >
  </lib-social-compose>
  @for (post of posts(); track post.id; let i = $index) {
    <div class="post">
      <lib-post
        [profile]="profiles()[post.profileId]"
        [availableProfiles]="profiles()"
        [content]="post"
        [comments]="post.comments || []"
        [canDelete]="canDeletePost(post)"
        (postDeleted)="onDeletePost(post)"
        [canFollow]="canFollow(post)"
        [isFollowing]="isFollowing(post)"
        (followToggle)="onFollowToggle(post)"
        (newCommentAdded)="commented($event, i)"
      ></lib-post>
    </div>
  }
</div>
