<div class="container">
  <otui-app-bar
    appTitle="Optimistic Tanuki"
    logoSrc="assets/tanuki.jpg"
    logoAlt="Optimistic Tanuki Logo"
    [showThemeToggle]="true"
    [useTile]="false"
    (menuToggle)="toggleNav()"
  >
  </otui-app-bar>

  <otui-nav-sidebar
    [isOpen]="isNavExpanded()"
    [navItems]="navItems()"
    heading="Navigation"
    (close)="isNavExpanded.set(false)"
  >
  </otui-nav-sidebar>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
