# Docker Compose for Gateway E2E Tests
# Full stack setup for testing gateway with all backend services
services:
  db:
    image: postgres:latest
    restart: always
    container_name: e2e_db_gateway
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: node:lts-alpine
    container_name: e2e_db_setup_gateway
    working_dir: /workspace
    volumes:
      - ../../../../:/workspace
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && npm run db:setup"
    restart: 'no'

  authentication:
    container_name: e2e_authentication_gw
    build:
      context: ../../../../
      dockerfile: ./apps/authentication/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: postgres
      JWT_SECRET: e2e-test-jwt-secret
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  profile:
    container_name: e2e_profile_gw
    build:
      context: ../../../../
      dockerfile: ./apps/profile/Dockerfile
    ports:
      - '3002:3002'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: postgres
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  permissions:
    container_name: e2e_permissions_gw
    build:
      context: ../../../../
      dockerfile: ./apps/permissions/Dockerfile
    ports:
      - '3012:3012'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: postgres
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  blogging:
    container_name: e2e_blogging_gw
    build:
      context: ../../../../
      dockerfile: ./apps/blogging/Dockerfile
    ports:
      - '3011:3011'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: postgres
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  gateway:
    container_name: e2e_gateway
    build:
      context: ../../../../
      dockerfile: ./apps/gateway/Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./e2e-config.yaml:/usr/src/app/assets/config.yaml
    environment:
      JWT_SECRET: e2e-test-jwt-secret
    depends_on:
      db:
        condition: service_healthy
      authentication:
        condition: service_started
      profile:
        condition: service_started
      permissions:
        condition: service_started
      blogging:
        condition: service_started
