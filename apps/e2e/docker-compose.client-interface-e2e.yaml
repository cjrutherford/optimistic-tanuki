services:
  db:
    image: postgres:latest
    restart: always
    container_name: e2e_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - e2e_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: node:lts-alpine
    container_name: e2e_db_setup
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "apk add --no-cache postgresql-client && npm run db:setup"
    restart: 'no'

  redis:
    image: redis:latest
    container_name: e2e_redis
    ports:
      - '6379:6379'
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  authentication:
    container_name: e2e_authentication
    build:
      context: ../..
      dockerfile: ./apps/authentication/Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  profile:
    container_name: e2e_profile
    build:
      context: ../..
      dockerfile: ./apps/profile/Dockerfile
    ports:
      - '3002:3002'
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  social:
    container_name: e2e_social
    build:
      context: ../..
      dockerfile: ./apps/social/Dockerfile
    ports:
      - '3003:3003'
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  chat-collector:
    container_name: e2e_chat_collector
    build:
      context: ../..
      dockerfile: ./apps/chat-collector/Dockerfile
    ports:
      - '3007:3007'
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully

  ot-client-interface:
    container_name: e2e_client_interface
    build:
      context: ../..
      dockerfile: ./apps/client-interface/Dockerfile
    ports:
      - '8080:4000'

  gateway:
    container_name: e2e_gateway
    build:
      context: ../..
      dockerfile: ./apps/gateway/Dockerfile
    ports:
      - '3000:3000'
      - '3300:3300'
      - '3301:3301'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:3000/api/mcp/sse'', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on(''error'', (err) => process.exit(1));"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      authentication:
        condition: service_started
      ot-client-interface:
        condition: service_started
      profile:
        condition: service_started
      social:
        condition: service_started
      chat-collector:
        condition: service_started

volumes:
  e2e_postgres_data:
