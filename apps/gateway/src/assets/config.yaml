auth:
  jwtSecret: |
    c3VwZXJzZWNyZXRzdHJpbmc=
oauth:
  google:
    enabled: true
    clientId: ${GOOGLE_CLIENT_ID}
    clientSecret: ${GOOGLE_CLIENT_SECRET}
    redirectUri: ${GOOGLE_REDIRECT_URI}
    scopes:
      - openid
      - email
      - profile
    authorizationEndpoint: https://accounts.google.com/o/oauth2/v2/auth
    tokenEndpoint: https://oauth2.googleapis.com/token
    userInfoEndpoint: https://openidconnect.googleapis.com/v1/userinfo
  github:
    enabled: true
    clientId: ${GITHUB_CLIENT_ID}
    clientSecret: ${GITHUB_CLIENT_SECRET}
    redirectUri: ${GITHUB_REDIRECT_URI}
    scopes:
      - read:user
      - user:email
    authorizationEndpoint: https://github.com/login/oauth/authorize
    tokenEndpoint: https://github.com/login/oauth/access_token
    userInfoEndpoint: https://api.github.com/user
  microsoft:
    enabled: true
    clientId: ${MICROSOFT_CLIENT_ID}
    clientSecret: ${MICROSOFT_CLIENT_SECRET}
    redirectUri: ${MICROSOFT_REDIRECT_URI}
    scopes:
      - openid
      - email
      - profile
      - User.Read
    authorizationEndpoint: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
    tokenEndpoint: https://login.microsoftonline.com/common/oauth2/v2.0/token
    userInfoEndpoint: https://graph.microsoft.com/v1.0/me
  facebook:
    enabled: true
    clientId: ${FACEBOOK_CLIENT_ID}
    clientSecret: ${FACEBOOK_CLIENT_SECRET}
    redirectUri: ${FACEBOOK_REDIRECT_URI}
    scopes:
      - email
      - public_profile
    authorizationEndpoint: https://www.facebook.com/v18.0/dialog/oauth
    tokenEndpoint: https://graph.facebook.com/v18.0/oauth/access_token
    userInfoEndpoint: https://graph.facebook.com/v18.0/me
  apps:
    - domain: ${CLIENT_INTERFACE_DOMAIN}
      google:
        clientId: ${CI_GOOGLE_CLIENT_ID}
        clientSecret: ${CI_GOOGLE_CLIENT_SECRET}
        redirectUri: ${CI_GOOGLE_REDIRECT_URI}
      github:
        clientId: ${CI_GITHUB_CLIENT_ID}
        clientSecret: ${CI_GITHUB_CLIENT_SECRET}
        redirectUri: ${CI_GITHUB_REDIRECT_URI}
      microsoft:
        clientId: ${CI_MICROSOFT_CLIENT_ID}
        clientSecret: ${CI_MICROSOFT_CLIENT_SECRET}
        redirectUri: ${CI_MICROSOFT_REDIRECT_URI}
      facebook:
        clientId: ${CI_FACEBOOK_CLIENT_ID}
        clientSecret: ${CI_FACEBOOK_CLIENT_SECRET}
        redirectUri: ${CI_FACEBOOK_REDIRECT_URI}

# Permissions cache configuration
# Provider options: memory, file, redis
permissions:
  cache:
    provider: memory # Use 'file' for persistent cache or 'redis' for distributed cache
    ttl: 300000 # Cache TTL in milliseconds (5 minutes)
    maxSize: 10000 # Maximum cache entries (for memory/file providers)


    # File-based cache configuration (only used when provider is 'file')
    # cacheDir: /tmp/permissions-cache

    # Redis cache configuration (only used when provider is 'redis')
    # redis:
    #   host: localhost
    #   port: 6379
    #   password: your-redis-password  # Optional
    #   db: 0                          # Redis database number
    #   keyPrefix: 'permissions:'      # Key prefix for cache entries
