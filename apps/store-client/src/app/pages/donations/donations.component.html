<div class="donations-page">
  <header class="page-header">
    <h1>Support Us</h1>
    <p>Your donations help us continue to provide great products and services</p>
  </header>

  <div class="success-message" *ngIf="success">{{ success }}</div>
  <div class="error-message" *ngIf="error">{{ error }}</div>

  <store-donation (donate)="onDonate($event)" [disabled]="loading"></store-donation>
</div>
