<section class="manifesto-rail" data-theme-surface="feature">
  <div class="manifesto-copy">
    <p class="eyebrow">HAI Approach</p>
    <h2>Cloud fluency without surrendering ownership.</h2>
    <p>
      We design systems that let hosted platforms and personal infrastructure
      reinforce each other instead of competing for control.
    </p>
  </div>

  <div class="manifesto-track">
    <otui-shimmer-beam
      class="manifesto-beam"
      height="100%"
      direction="horizontal"
      [speed]="0.85"
      [intensity]="0.72"
      [reducedMotion]="reducedMotion"
    ></otui-shimmer-beam>

    <div class="manifesto-grid">
      @for (item of manifesto; track item.label) {
      <article class="manifesto-card" data-theme-surface="card">
        <span class="manifesto-label">{{ item.label }}</span>
        <p>{{ item.value }}</p>
      </article>
      }
    </div>
  </div>
</section>
