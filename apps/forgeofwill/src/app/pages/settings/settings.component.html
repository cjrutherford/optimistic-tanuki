<div class="settings-container">
  <lib-settings-shell
    [title]="title"
    [description]="description"
    [profileName]="profileName"
    [profileImage]="profileImage"
    [backgroundImage]="backgroundImage"
    [profile]="profile()"
    [defaultName]="profileName"
    [hasThemeSection]="true"
    profileHint="Edit forge profile"
    (createProfile)="onCreateProfile($event)"
    (updateProfile)="onUpdateProfile($event)"
  >
    <section class="settings-section" settings-theme>
      <h2>Theme & Personality</h2>
      <p class="section-description">
        Keep the forge recognizable while choosing a personality that supports
        the kind of work you are about to do.
      </p>
      <lib-personality-selector
        (personalitySelected)="onPersonalitySelected($event)"
      ></lib-personality-selector>

      <div class="controls">
        <otui-button (click)="toggleThemeDesigner()"
          >{{ showThemeDesigner ? 'Hide' : 'Show' }} Theme Designer</otui-button
        >
      </div>

      <div *ngIf="showThemeDesigner" class="theme-designer">
        <lib-theme-designer></lib-theme-designer>
      </div>
    </section>
  </lib-settings-shell>
</div>
