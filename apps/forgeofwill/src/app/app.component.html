<div class="app-container">
  <otui-app-bar
    appTitle="Forge of Will"
    logoSrc="android-chrome-192x192.png"
    logoAlt="Forge of Will Logo"
    [showThemeToggle]="true"
    [useTile]="false"
    (menuToggle)="showModal()"
  >
  </otui-app-bar>

  <otui-nav-sidebar
    [isOpen]="isModalOpen()"
    [navItems]="navItems()"
    heading="Navigation"
    (close)="isModalOpen.set(false)"
  >
  </otui-nav-sidebar>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  @if (isAuthenticated() && selectedProfile()) {
  <app-chat [externalMessages]="newPersonaMessages()"></app-chat>
  <app-ai-assistant-bubble
    [userProfile]="selectedProfile()"
    (personaSelected)="onPersonaSelected($event)"
  ></app-ai-assistant-bubble>
  }

  <lib-message></lib-message>

  <hai-about-tag [config]="haiAboutConfig"></hai-about-tag>
  <otui-dev-info />
</div>
