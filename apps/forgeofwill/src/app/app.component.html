<!-- Workstream C2: reference integration of the reusable page-background
     delivery mechanism. Replaces the `--page-background-pattern` layer that
     used to be painted directly on `body` in styles.scss (removed there to
     avoid painting the same pattern twice). -->
<lib-personality-backdrop />

@if (isBrowser) {
<div class="motion-background" aria-hidden="true">
  <otui-pulse-rings
    [reducedMotion]="reducedMotion"
    height="100vh"
    [ringCount]="5"
    [speed]="0.32"
    [intensity]="0.45"
  ></otui-pulse-rings>
</div>
}

<div class="app-content">
  <div class="app-container">
    <otui-app-bar
      appTitle="Forge of Will"
      logoSrc="android-chrome-192x192.png"
      logoAlt="Forge of Will Logo"
      [showThemeToggle]="true"
      [useTile]="false"
      (menuToggle)="showModal()"
    >
    </otui-app-bar>

    <otui-nav-sidebar
      [isOpen]="isModalOpen()"
      [navItems]="navItems()"
      heading="Navigation"
      (close)="isModalOpen.set(false)"
    >
    </otui-nav-sidebar>

    <main class="main-content">
      @if (workspaceSummary(); as summary) {
      <section class="workflow-summary">
        <p class="workflow-kicker">{{ summary.eyebrow }}</p>
        <h1>{{ summary.title }}</h1>
        <p>{{ summary.description }}</p>
      </section>
      }
      <router-outlet></router-outlet>
    </main>

    @if (isAuthenticated() && selectedProfile()) {
    <app-chat [externalMessages]="newPersonaMessages()"></app-chat>
    <app-ai-assistant-bubble
      [userProfile]="selectedProfile()"
      (personaSelected)="onPersonaSelected($event)"
    ></app-ai-assistant-bubble>
    }

    <lib-message></lib-message>

    <hai-about-tag [config]="haiAboutConfig"></hai-about-tag>
    <otui-dev-info />
  </div>
</div>
