<div class="map-wrapper">
  @if (isLoading()) {
  <div class="map-loading">
    <div class="loading-spinner"></div>
    <p>Loading map...</p>
  </div>
  }
  <div #mapContainer class="map-container" [class.hidden]="isLoading()"></div>

  <div class="map-controls">
    <button class="map-control-btn" (click)="resetView()" title="Reset view">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
        <path d="M3 3v5h5" />
      </svg>
    </button>
  </div>

  <div class="map-legend">
    @if (mode === 'single-location' || mode === 'radius-focus') {
    <div class="legend-item">
      <span class="legend-dot focus"></span>
      <span>{{ centerLabel }}</span>
    </div>
    }
    @if (mode === 'atlas-nearby') {
    <div class="legend-item">
      <span class="legend-dot user"></span>
      <span>Your location</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot city"></span>
      <span>Nearby Locality</span>
    </div>
    }
    @if (mode === 'radius-focus') {
    <div class="legend-item">
      <span class="legend-circle"></span>
      <span>250mi Radius</span>
    </div>
    }
  </div>
</div>
