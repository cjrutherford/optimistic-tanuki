<div class="container">
  <otui-app-bar
    appTitle="Local Hub"
    logoAlt="Local Hub Logo"
    [showThemeToggle]="true"
    [useTile]="false"
    (menuToggle)="toggleNav()"
  >
  </otui-app-bar>

  <otui-nav-sidebar
    [isOpen]="isNavExpanded()"
    [navItems]="navItems()"
    heading="Navigation"
    (close)="isNavExpanded.set(false)"
  >
  </otui-nav-sidebar>

  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <otui-dev-info />

  <lib-message />
</div>
